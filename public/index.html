<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>tieout — public + private financial intelligence, reconciled & tied out</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --panel2:#fbfcfd;
    --line:#e3e6eb; --line2:#eef1f4;
    --ink:#0f172a; --ink2:#334155; --muted:#64748b; --faint:#94a3b8;
    --accent:#2348b8; --accent-soft:#eaf0ff;
    --ok:#15803d; --ok-soft:#e7f4ec; --warn:#b45309; --warn-soft:#fbf0e2;
    --bad:#b91c1c; --bad-soft:#fbeaea; --slate:#475569; --slate-soft:#eef2f6;
    --teal:#0f766e; --teal-soft:#e3f3f1; --purple:#6d28d9; --purple-soft:#f0eafd;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,Menlo,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
    --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .ulabel{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:700}

  /* shell */
  .app{display:grid;grid-template-columns:208px 1fr;min-height:100vh}
  .side{background:var(--panel);border-right:1px solid var(--line);padding:16px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:3px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.3px;padding:4px 8px 14px}
  .logo{display:grid;grid-template-columns:repeat(2,8px);grid-auto-rows:8px;gap:2px}
  .logo i{border-radius:2px;background:var(--ink)} .logo i.a{background:var(--accent)}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500}
  .nav:hover{background:var(--slate-soft);color:var(--ink)}
  .nav.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .nav .ic{width:16px;text-align:center;font-size:14px}
  .side .sp{flex:1}
  .side .ghost{font-size:11.5px;color:var(--faint);padding:8px 10px;border-top:1px solid var(--line2);margin-top:6px}

  .main{min-width:0;display:flex;flex-direction:column}
  /* context bar */
  .ctx{background:var(--panel);border-bottom:1px solid var(--line);padding:11px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
  .ctx .co{font-weight:650;font-size:14px}
  .ctx .co .tk{font-family:var(--mono);color:var(--accent)}
  .ctx .srcs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .srcchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--ok-soft);color:var(--ok)}
  .srcchip.off{background:var(--slate-soft);color:var(--slate)}
  .content{padding:22px;max-width:1240px;width:100%}

  .phead{margin-bottom:16px}
  .phead h1{margin:0 0 3px;font-size:19px;letter-spacing:-.3px;font-weight:700}
  .phead p{margin:0;color:var(--muted);font-size:12.5px;max-width:780px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-sm);margin-bottom:16px}
  .panel .ph{padding:12px 15px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:9px}
  .panel .ph h3{margin:0;font-size:13px;font-weight:650}
  .panel .ph .sub{color:var(--faint);font-size:11.5px;margin-left:auto;font-weight:400}
  .panel .pb{padding:14px 15px}
  .panel.flush .pb{padding:0}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:8px 14px;border-bottom:1px solid var(--line2)}
  th{color:var(--faint);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tr.click{cursor:pointer} tr.click:hover{background:var(--panel2)}
  tr.sel{background:var(--accent-soft)}

  .chip{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;white-space:nowrap}
  .chip.ok{background:var(--ok-soft);color:var(--ok)}
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.bad{background:var(--bad-soft);color:var(--bad)}
  .chip.slate{background:var(--slate-soft);color:var(--slate)}
  .chip.acc{background:var(--accent-soft);color:var(--accent)}
  .chip.teal{background:var(--teal-soft);color:var(--teal)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 15px;box-shadow:var(--shadow-sm)}
  .kc .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;margin-bottom:8px}
  .kc .v{font-family:var(--mono);font-size:25px;font-weight:650;letter-spacing:-1px;line-height:1}
  .kc .d{font-size:11px;color:var(--muted);margin-top:6px}
  .kc.danger .v{color:var(--bad)} .kc.good .v{color:var(--ok)} .kc.warn .v{color:var(--warn)}

  .two{display:grid;grid-template-columns:1.25fr 1fr;gap:16px}
  @media(max-width:980px){.two{grid-template-columns:1fr}}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px;box-shadow:var(--shadow-sm)}
  .card.click{cursor:pointer;transition:.12s} .card.click:hover{border-color:var(--accent);box-shadow:var(--shadow)}
  .card .ct{font-weight:650;font-size:14px;display:flex;align-items:center;gap:8px}
  .card .cv{font-size:12px;color:var(--muted);margin-top:2px}
  .card .cd{font-size:12px;color:var(--ink2);margin-top:10px}
  .card .cmeta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:10px}

  .ins{display:flex;gap:10px;padding:11px 13px;border:1px solid var(--line2);border-radius:9px;margin-bottom:8px;background:var(--panel2)}
  .ins .sv{width:3px;border-radius:3px;flex-shrink:0}
  .ins.high .sv{background:var(--bad)} .ins.medium .sv{background:var(--warn)} .ins.low .sv{background:var(--slate)}
  .ins .hl{font-weight:600;font-size:12.5px} .ins .dt{font-size:11.5px;color:var(--muted);margin-top:3px}
  .ins .ev{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:4px}

  .recon td .v{font-family:var(--mono)}
  .miniwc{display:flex;gap:8px;flex-wrap:wrap}
  .wccell{flex:1;min-width:90px;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:9px 11px}
  .wccell .k{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
  .wccell .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:2px}

  .btn{background:var(--accent);color:#fff;border:none;padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer}
  .btn:hover{filter:brightness(1.06)} .btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  .btn.sm{padding:5px 11px;font-size:11.5px}
  .search{display:flex;gap:8px;margin-bottom:16px}
  .search input{flex:0 0 320px;border:1px solid var(--line);border-radius:8px;padding:9px 13px;font-size:13px;font-family:var(--sans)}
  .search input:focus{outline:none;border-color:var(--accent)}

  /* inspector */
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:40;opacity:0;pointer-events:none;transition:.15s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:430px;max-width:94vw;background:var(--panel);border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(15,23,42,.12);z-index:50;transform:translateX(100%);transition:transform .18s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer .dh{padding:15px 18px;border-bottom:1px solid var(--line)}
  .drawer .db{padding:16px 18px;overflow-y:auto;flex:1}
  .drawer .x{position:absolute;top:13px;right:16px;cursor:pointer;color:var(--faint);font-size:20px;border:none;background:none}
  .sec{margin-bottom:20px} .sec h4{margin:0 0 9px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700}
  .trace{position:relative;margin-left:5px;padding-left:17px;border-left:2px solid var(--line)}
  .tev{position:relative;margin-bottom:10px;font-size:12px}
  .tev:before{content:'';position:absolute;left:-23px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--ok);border:2px solid var(--panel)}
  .tev .s{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kv .i{background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:6px 10px;min-width:80px}
  .kv .i .k{font-size:9.5px;color:var(--faint);text-transform:uppercase} .kv .i .v{font-family:var(--mono);font-size:13px;font-weight:600;margin-top:1px}
  code{font-family:var(--mono);background:var(--slate-soft);padding:1px 5px;border-radius:4px;font-size:11px}
  .note{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:11px 13px;color:var(--muted);font-size:12px}
  .callout{background:var(--accent-soft);border:1px solid #cfdcff;border-radius:9px;padding:11px 14px;font-size:12px;color:#22356f}
  .callout b{color:var(--accent)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
  .loading{color:var(--muted);padding:50px;text-align:center}
  .memo{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:26px 30px;max-width:760px;box-shadow:var(--shadow-sm)}
  .memo h2{font-size:18px;margin:0 0 2px} .memo .by{color:var(--faint);font-size:11.5px;margin-bottom:16px}
  .memo h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin:18px 0 8px}
  .memo li{margin:5px 0;font-size:13px} .memo .cite{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
</style>
</head>
<body>
<div class="app">
  <div class="side">
    <div class="brand"><span class="logo"><i class="a"></i><i></i><i></i><i></i></span> tieout</div>
    <div id="nav"></div>
    <div class="sp"></div>
    <div class="ghost">Public filings + private ERP/CRM, reconciled & tied out.<br>Calibrated demo data.</div>
  </div>
  <div class="main">
    <div class="ctx" id="ctx"></div>
    <div class="content" id="view"></div>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>

<script>
const NAV=[['workflows','Workflows','◧'],['qoe','QoE workspace','▦'],['companies','Companies','▤'],
  ['sources','Sources','⇄'],['runs','Runs','↻'],['artifacts','Artifacts','▭'],['evals','Evals','✓']];
const S={tab:'qoe',company:null,companies:[],qoe:null,sources:[],evals:null,bench:null,inspect:null,busy:false};
const $=h=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
function pct(v){return v==null?'—':(v*100).toFixed(Math.abs(v*100)>=10?0:1)+'%';}
function money(v){if(v==null)return '—';const a=Math.abs(v),s=v<0?'−':'';
  if(a>=1e9)return s+'$'+(a/1e9).toFixed(2)+'B';if(a>=1e6)return s+'$'+(a/1e6).toFixed(0)+'M';
  if(a>=1e3)return s+'$'+(a/1e3).toFixed(0)+'K';return s+'$'+a.toFixed(0);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function boot(){
  const j=async u=>{try{return await(await fetch(u)).json();}catch(e){return null;}};
  S.companies=await j('/api/qoe/companies')||[];
  if(S.companies.length){S.company=S.companies[0].ticker; await loadCompany();}
  renderNav(); render();
}
async function loadCompany(){
  const j=async u=>{try{return await(await fetch(u)).json();}catch(e){return null;}};
  [S.qoe,S.sources]=await Promise.all([j('/api/qoe/'+S.company),j('/api/sources/'+S.company)]);
}
function renderNav(){
  const n=document.getElementById('nav');n.innerHTML='';
  NAV.forEach(([id,label,ic])=>{const e=$(`<div class="nav ${id===S.tab?'active':''}"><span class="ic">${ic}</span>${label}</div>`);
    e.onclick=()=>{S.tab=id;closeInspect();renderNav();render();};n.appendChild(e);});
  renderCtx();
}
function renderCtx(){
  const c=document.getElementById('ctx');const q=S.qoe;
  if(!q||!q.ticker){c.innerHTML='<div class="co">No company loaded</div>';return;}
  const chips=(S.sources||[]).map(s=>`<span class="srcchip ${s.status==='connected'?'':'off'}">${s.status==='connected'?'●':'○'} ${s.name}${s.tied_out?' · tied out ✓':''}</span>`).join('');
  c.innerHTML=`<div class="co"><span class="tk">${q.ticker}</span> · ${q.issuer} · FY${q.fiscal_year}</div><div class="srcs">${chips}</div>`;
}
function render(){const v=document.getElementById('view');
  v.innerHTML='';v.appendChild(({workflows:vWorkflows,qoe:vQoE,companies:vCompanies,sources:vSources,
    runs:vRuns,artifacts:vArtifacts,evals:vEvals}[S.tab]||vQoE)());}

/* ---------- Workflows library ---------- */
function vWorkflows(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Workflows</h1><p>Saved analyses that fuse public filings with private ERP/CRM. Running one compiles a set of cell-agents that retrieve, reconcile, and tie out — the work shows in the right inspector.</p></div>`));
  const wf=[
    {id:'qoe',name:'Quality of Earnings',tag:'ready',desc:'Reconcile filed segment revenue against the customer/SKU ledger — surface concentration, underlying growth, one-time revenue, margin mix, DSO drift.',kind:'acc'},
    {id:'grid',name:'Verified Query Grid',tag:'ready',desc:'Documents × questions, each cell gated against XBRL ground truth (tie-out + identity reconciliation).',kind:'teal',href:true},
    {id:'',name:'Coverage Ramp',tag:'roadmap',desc:'Bottoms-up: decompose the public revenue ramp by customer cohort + SKU mix from the ERP.',kind:'slate'},
    {id:'',name:'Covenant Headroom',tag:'roadmap',desc:'Project covenant compliance from live bookings + AR aging before the quarter closes.',kind:'slate'},
    {id:'',name:'Pipeline → Revenue',tag:'roadmap',desc:'Win-rate-weighted CRM pipeline → next-quarter revenue vs guidance/consensus.',kind:'slate'},
  ];
  const grid=$('<div class="cards"></div>');
  wf.forEach(w=>{const c=$(`<div class="card ${w.id?'click':''}">
    <div class="ct">${w.name} <span class="chip ${w.tag==='ready'?w.kind:'slate'}">${w.tag}</span></div>
    <div class="cd">${w.desc}</div>
    ${w.id?`<div style="margin-top:12px"><button class="btn sm">Open →</button></div>`:''}</div>`);
    if(w.id==='qoe') c.querySelector('button').onclick=()=>{S.tab='qoe';renderNav();render();};
    if(w.id==='grid') c.querySelector('button').onclick=()=>{S.tab='evals';renderNav();render();};
    grid.appendChild(c);});
  el.appendChild(grid);
  return el;
}

/* ---------- QoE workspace (the hero) ---------- */
function vQoE(){
  const q=S.qoe;const el=$('<div></div>');
  if(!q||!q.ticker){el.appendChild($(`<div class="note">No Quality-of-Earnings run yet. Pick a company in <b>Companies</b>.</div>`));return el;}
  el.appendChild($(`<div class="phead"><h1>Quality of Earnings — ${q.issuer}</h1>
    <p>The filed consolidated numbers, reconciled against the granular private ledger. Every figure rolls up to the public total (tied out); the findings are what the 10-K never breaks out.</p></div>`));
  // KPI cards
  const ug=q.underlying_growth, rg=q.reported_growth;
  el.appendChild($(`<div class="kpis">
    <div class="kc"><div class="k">Reported growth</div><div class="v">${pct(rg)}</div><div class="d">consolidated, from the filing</div></div>
    <div class="kc ${ug!=null&&rg!=null&&ug<rg-0.02?'danger':''}"><div class="k">Underlying growth</div><div class="v">${pct(ug)}</div><div class="d">ex-largest customer (${esc(q.largest_customer||'')})</div></div>
    <div class="kc ${q.top5_concentration>=0.3?'warn':''}"><div class="k">Top-5 concentration</div><div class="v">${pct(q.top5_concentration)}</div><div class="d">undisclosed in the filing</div></div>
    <div class="kc ${q.net_retention!=null&&q.net_retention<0.97?'warn':'good'}"><div class="k">Net retention</div><div class="v">${q.net_retention!=null?pct(q.net_retention):'—'}</div><div class="d">CRM cohort expansion</div></div>
  </div>`));
  // two-pane: reconciliation + concentration | findings + WC + pipeline
  const recon=(q.reconciliation||[]).filter(r=>r.fiscal_year===q.fiscal_year);
  let rrows=recon.map(r=>`<tr><td>${r.marginal}</td><td class="num">${money(r.target)}</td><td class="num">${money(r.synthetic)}</td>
    <td class="num">${(r.pct*100).toFixed(2)}%</td><td>${r.ties_out?'<span class="chip ok">ties ✓</span>':'<span class="chip bad">off</span>'}</td></tr>`).join('');
  const conc=(q.top_customers||[]).map((c,i)=>`<tr class="click" data-i="${i}"><td>${esc(c.name)}${c.name===q.largest_customer?' <span class="chip warn">whale</span>':''}</td>
    <td class="num">${money(c.revenue)}</td><td class="num">${pct(c.pct_of_total)}</td><td class="num">${c.yoy!=null?(c.yoy>=0?'+':'')+pct(c.yoy):'—'}</td></tr>`).join('');
  const left=$(`<div>
    <div class="panel flush"><div class="ph"><h3>Reconciliation — public filing → private ledger</h3><span class="sub">${q.tied_out?'all tied out':'variance present'}</span></div>
      <table class="recon"><thead><tr><th>Public marginal (XBRL)</th><th class="num">Filed</th><th class="num">ERP roll-up</th><th class="num">Var</th><th>Tie-out</th></tr></thead><tbody>${rrows}</tbody></table></div>
    <div class="panel flush"><div class="ph"><h3>Customer concentration · the granular story</h3><span class="sub">click a row to inspect</span></div>
      <table><thead><tr><th>Customer</th><th class="num">Revenue</th><th class="num">% total</th><th class="num">YoY</th></tr></thead><tbody id="conc">${conc}</tbody></table></div>
  </div>`);
  const wc=q.working_capital||{}, pl=q.pipeline||{};
  const findings=(q.insights||[]).map(i=>`<div class="ins ${i.severity}"><div class="sv"></div><div>
    <div class="hl">${esc(i.headline)}</div><div class="dt">${esc(i.detail)}</div><div class="ev">${esc(i.evidence)}</div></div></div>`).join('');
  const right=$(`<div>
    <div class="panel"><div class="ph"><h3>Findings the filing hides</h3></div><div class="pb">${findings||'<div class="muted">No flags.</div>'}</div></div>
    <div class="panel"><div class="ph"><h3>Working capital</h3><span class="sub">from the balance sheet</span></div><div class="pb"><div class="miniwc">
      <div class="wccell"><div class="k">DSO</div><div class="v">${wc.dso??'—'}${wc.dso_prior?` <span class="faint" style="font-size:11px">↑${(wc.dso-wc.dso_prior).toFixed(0)}d</span>`:''}</div></div>
      <div class="wccell"><div class="k">DIO</div><div class="v">${wc.dio??'—'}</div></div>
      <div class="wccell"><div class="k">DPO</div><div class="v">${wc.dpo??'—'}</div></div></div></div></div>
    <div class="panel"><div class="ph"><h3>CRM pipeline</h3><span class="sub">Salesforce (synthetic)</span></div><div class="pb"><div class="miniwc">
      <div class="wccell"><div class="k">Weighted</div><div class="v">${money(pl.weighted)}</div></div>
      <div class="wccell"><div class="k">Coverage</div><div class="v">${pl.coverage!=null?pct(pl.coverage):'—'}</div></div>
      <div class="wccell"><div class="k">Open opps</div><div class="v">${pl.count??'—'}</div></div></div></div></div>
  </div>`);
  const two=$('<div class="two"></div>');two.appendChild(left);two.appendChild(right);el.appendChild(two);
  setTimeout(()=>{el.querySelectorAll('#conc tr').forEach(tr=>tr.onclick=()=>inspectCustomer(+tr.getAttribute('data-i')));},0);
  return el;
}

function inspectCustomer(i){
  const q=S.qoe;const c=q.top_customers[i];if(!c)return;
  const seg=(q.reconciliation||[]).find(r=>r.marginal.includes(c.segment));
  const d=document.getElementById('drawer');
  d.innerHTML=`<button class="x" onclick="closeInspect()">×</button>
    <div class="dh"><div class="ulabel">${q.ticker} · ERP ledger</div>
      <div style="font-size:15px;font-weight:650;margin-top:3px">${esc(c.name)}</div>
      <div class="kv">
        <div class="i"><div class="k">revenue</div><div class="v">${money(c.revenue)}</div></div>
        <div class="i"><div class="k">% total</div><div class="v">${pct(c.pct_of_total)}</div></div>
        <div class="i"><div class="k">YoY</div><div class="v">${c.yoy!=null?pct(c.yoy):'—'}</div></div>
        <div class="i"><div class="k">segment</div><div class="v" style="font-size:11px">${esc(c.segment)}</div></div>
      </div></div>
    <div class="db">
      <div class="sec"><h4>Rollup trace — granular → consolidated</h4><div class="trace">
        <div class="tev"><div class="s">route</div>numeric → ERP customer ledger</div>
        <div class="tev"><div class="s">retrieve</div>this customer's revenue lines (NetSuite, synthetic)</div>
        <div class="tev"><div class="s">roll up</div>into the <b>${esc(c.segment)}</b> segment</div>
        <div class="tev"><div class="s">tie-out</div>segment rolls up to the filed XBRL ${seg?'('+money(seg.target)+')':''}</div>
      </div></div>
      <div class="sec"><h4>Source</h4>
        <div class="note">Public: 10-K segment disclosure · <code>revenue.segment</code><br>Private: NetSuite ERP customer revenue lines (synthetic, calibrated)</div></div>
      <div class="sec"><h4>Evaluation</h4>
        <div class="kv">
          <div class="i"><div class="k">tie-out</div><div class="v" style="color:var(--ok);font-size:12px">${seg&&seg.ties_out?'✓ '+(seg.pct*100).toFixed(2)+'%':'—'}</div></div>
          <div class="i"><div class="k">supported</div><div class="v" style="color:var(--ok);font-size:12px">✓ yes</div></div>
        </div>
        <div class="callout" style="margin-top:10px"><b>Calibrated:</b> this customer is synthetic, but its revenue is part of a segment that ties out to ${q.issuer}'s real reported XBRL — the granular detail reconciles to the public truth.</div></div>
    </div>`;
  document.getElementById('scrim').classList.add('show');d.classList.add('show');
}
function closeInspect(){document.getElementById('scrim').classList.remove('show');document.getElementById('drawer').classList.remove('show');}

/* ---------- Companies ---------- */
function vCompanies(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Companies</h1><p>Select a company to set the active entity. EDGAR ingests its filings; the synthetic ERP/CRM is calibrated to its real XBRL.</p></div>`));
  const sb=$(`<div class="search"><input id="csearch" placeholder="Ticker (e.g. CRM, SNOW) — runs live, ~30s"/><button class="btn" id="cgo">Run live</button></div>`);
  el.appendChild(sb);
  const cards=$('<div class="cards"></div>');
  S.companies.forEach(co=>{const active=co.ticker===S.company;
    const c=$(`<div class="card click" style="${active?'border-color:var(--accent)':''}">
      <div class="ct"><span class="mono" style="color:var(--accent)">${co.ticker}</span> ${active?'<span class="chip acc">active</span>':''}</div>
      <div class="cv">${esc(co.issuer)} · FY${co.fiscal_year}</div>
      <div class="cmeta">${co.tied_out?'synthetic ledger tied out ✓':'—'}</div></div>`);
    c.onclick=async()=>{S.company=co.ticker;await loadCompany();S.tab='qoe';renderNav();render();};
    cards.appendChild(c);});
  el.appendChild(cards);
  setTimeout(()=>{const go=async()=>{const t=(sb.querySelector('#csearch').value||'').trim().toUpperCase();if(!t||S.busy)return;
    S.busy=true;sb.querySelector('#cgo').textContent='Running…';
    try{const r=await fetch('/api/qoe/'+t+'/run',{method:'POST'});if(!r.ok)throw new Error((await r.json()).detail||r.statusText);
      S.company=t;S.companies=await(await fetch('/api/qoe/companies')).json();await loadCompany();S.tab='qoe';renderNav();render();}
    catch(e){alert('Could not run '+t+': '+e.message);S.busy=false;sb.querySelector('#cgo').textContent='Run live';}};
    sb.querySelector('#cgo').onclick=go;sb.querySelector('#csearch').onkeydown=e=>{if(e.key==='Enter')go();};},0);
  return el;
}

/* ---------- Sources (connectors) ---------- */
function vSources(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Sources</h1><p>Every source — public filings, synthetic ERP/CRM, or a live connector — exposes the <b>same adapter interface</b>, so the workflows never know which fed them. Demo on synthetic; a real customer connects Merge and the exact same workflows run on live data.</p></div>`));
  el.appendChild($(`<div class="callout" style="margin-bottom:16px"><b>The swap that makes it real:</b> <code>EdgarAdapter</code> (public) · <code>SyntheticAdapter</code> (EDGAR-anchored demo) · <code>MergeAdapter</code> (production). The synthetic ledger is validated by the same tie-out harness that checks real extraction — one trust layer, two jobs.</div>`));
  const kindColor={public:'teal',synthetic:'purple',live:'slate'};
  const cards=$('<div class="cards"></div>');
  (S.sources||[]).forEach(s=>{
    const st=s.status==='connected'?`<span class="chip ok"><span class="dot ok"></span>connected</span>`:`<span class="chip slate">available</span>`;
    const tie=s.tied_out?'<span class="chip ok">tied out ✓</span>':(s.tied_out===false?'<span class="chip bad">off</span>':'');
    cards.appendChild($(`<div class="card">
      <div class="ct">${s.name} <span class="chip ${kindColor[s.kind]||'slate'}">${s.kind}</span></div>
      <div class="cv">${s.vendor}</div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">${st}${tie}</div>
      <div class="cd">${s.provides}</div>
      <div class="cmeta">${esc(s.detail)}</div></div>`));});
  el.appendChild(cards);
  return el;
}

/* ---------- Runs ---------- */
function vRuns(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Runs</h1><p>Workflows are a standing process, not a one-off. They re-run when a new filing lands or ERP data refreshes, and diff against the prior run.</p></div>`));
  let rows=S.companies.map(co=>`<tr><td><b>Quality of Earnings</b></td><td class="mono">${co.ticker}</td>
    <td>${co.tied_out?'<span class="chip ok">tied out ✓</span>':'—'}</td><td class="muted">on latest 10-K</td>
    <td><span class="chip slate">watch: re-run on new filing</span></td></tr>`).join('');
  el.appendChild($(`<div class="panel flush"><table><thead><tr><th>Workflow</th><th>Company</th><th>Status</th><th>Trigger</th><th>Monitor</th></tr></thead><tbody>${rows}</tbody></table></div>`));
  el.appendChild($(`<div class="note">Continuous monitoring (scheduled re-runs + delta alerts on concentration / DSO / covenant headroom) is wired as a scheduler hook — roadmap.</div>`));
  return el;
}

/* ---------- Artifacts (memo) ---------- */
function vArtifacts(){
  const q=S.qoe;const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Artifacts</h1><p>A finished, source-cited deliverable generated from the run. Citations travel with it (public → filing; private → ledger).</p></div>`));
  if(!q||!q.ticker){el.appendChild($('<div class="note">No run loaded.</div>'));return el;}
  const ins=(q.insights||[]).map(i=>`<li>${esc(i.headline)} <span class="cite">— ${esc(i.evidence)}</span></li>`).join('');
  el.appendChild($(`<div class="memo">
    <h2>Quality-of-Earnings — ${q.issuer} (${q.ticker})</h2>
    <div class="by">FY${q.fiscal_year} · calibrated demo data anchored to SEC EDGAR/XBRL · ${q.tied_out?'reconciliation tied out ✓':'reconciliation variance'}</div>
    <h3>Summary</h3>
    <div style="font-size:13px">Reported growth of ${pct(q.reported_growth)} is concentrated: the top 5 customers are ${pct(q.top5_concentration)} of revenue and ex-largest underlying growth is ${pct(q.underlying_growth)}. Net retention ${q.net_retention!=null?pct(q.net_retention):'—'}; pipeline covers ${q.pipeline&&q.pipeline.coverage!=null?pct(q.pipeline.coverage):'—'} of next-year growth.</div>
    <h3>Findings</h3><ul>${ins}</ul>
    <h3>Reconciliation</h3>
    <div style="font-size:12.5px" class="muted">${(q.reconciliation||[]).filter(r=>r.fiscal_year===q.fiscal_year).length} public marginals checked against the private ledger — ${q.tied_out?'all tie out within tolerance':'see variances'}.</div>
    <div style="margin-top:18px"><button class="btn" onclick="dlMemo()">Download memo (.md)</button> <span class="faint" style="font-size:11px">Word / PPTX export — roadmap</span></div>
  </div>`));
  return el;
}
function dlMemo(){const q=S.qoe;
  let md=`# Quality of Earnings — ${q.issuer} (${q.ticker}) FY${q.fiscal_year}\n\n_Calibrated demo data anchored to SEC EDGAR/XBRL. Reconciliation ${q.tied_out?'tied out.':'has variance.'}_\n\n## Findings\n`;
  (q.insights||[]).forEach(i=>{md+=`- **${i.headline}** — ${i.detail} (${i.evidence})\n`;});
  const b=new Blob([md],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`QoE_${q.ticker}.md`;a.click();}

/* ---------- Evals ---------- */
function vEvals(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Evals — the trust layer</h1><p>The tie-out harness, surfaced globally. It validates real extraction <i>and</i> synthetic generation — one trust layer doing both jobs.</p></div>`));
  const tied=S.companies.filter(c=>c.tied_out).length;
  el.appendChild($(`<div class="kpis">
    <div class="kc good"><div class="k">QoE reconciliations</div><div class="v">${tied}/${S.companies.length}</div><div class="d">synthetic ledger ties to XBRL</div></div>
    <div class="kc good"><div class="k">Tie-out tolerance</div><div class="v">±1%</div><div class="d">interval, rounding-aware</div></div>
    <div class="kc"><div class="k">Constraints / company</div><div class="v">6+</div><div class="d">revenue, segments, COGS, AR…</div></div>
    <div class="kc"><div class="k">Ground truth</div><div class="v">XBRL</div><div class="d">machine-readable, free</div></div>
  </div>`));
  if(!S.evals){fetch('/api/eval/metrics').then(r=>r.json()).then(m=>{S.evals=m||{};if(S.tab==='evals')render();}).catch(()=>{S.evals={};});
    el.appendChild($('<div class="loading"><span class="spin"></span>loading verified-grid metrics…</div>'));return el;}
  const m=S.evals;
  if(m&&m.tie_out_accuracy!=null){
    el.appendChild($(`<div class="panel"><div class="ph"><h3>Verified Query Grid — extraction eval</h3><span class="sub">the other half of the trust layer</span></div><div class="pb"><div class="miniwc">
      <div class="wccell"><div class="k">Tie-out</div><div class="v">${pct(m.tie_out_accuracy)}</div></div>
      <div class="wccell"><div class="k">Hallucination</div><div class="v">${pct(m.hallucination_rate)}</div></div>
      <div class="wccell"><div class="k">Grounding</div><div class="v">${pct(m.grounding_rate)}</div></div>
      <div class="wccell"><div class="k">Escalations</div><div class="v">${m.gate?m.gate.escalated:'—'}</div></div></div></div></div>`));
  }
  el.appendChild($(`<div class="callout">Generation tie-out: every synthetic ledger is rejected unless it sums back to the reported XBRL within tolerance. Same harness as real-extraction verification.</div>`));
  return el;
}

document.getElementById('scrim').onclick=closeInspect;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeInspect();});
boot();
</script>
