<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>tieout — verify what AI extracts from filings</title>
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --surface2:#fbfcfd;
    --line:#e6e8eb; --line2:#eef0f2;
    --text:#0d1117; --muted:#646b76; --faint:#8b929c;
    --accent:#2f6bff; --accent-soft:#eaf0ff;
    --ok:#16a34a; --ok-soft:#e7f6ec; --bad:#dc2626; --bad-soft:#fdecec;
    --warn:#b45309; --warn-soft:#fbf1e3; --gray:#6b7280; --gray-soft:#eef0f2;
    --mono:'SFMono-Regular',ui-monospace,Consolas,Menlo,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
    --shadow-sm:0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1140px;margin:0 auto;padding:0 28px}

  /* top bar */
  .topbar{background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .nav{display:flex;align-items:center;gap:16px;height:72px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:21px;letter-spacing:-.3px}
  .logo{display:grid;grid-template-columns:repeat(2,10px);grid-auto-rows:10px;gap:3px}
  .logo i{border-radius:50%;background:var(--text)} .logo i.a{background:var(--accent)}
  .navlinks{display:flex;gap:2px;flex:1;min-width:0;overflow-x:auto}
  .navlinks::-webkit-scrollbar{height:0}
  .nl{padding:8px 11px;border-radius:8px;color:var(--muted);cursor:pointer;white-space:nowrap;font-size:14px;font-weight:500}
  .brand,.ghbtn{flex-shrink:0}
  .nl:hover{background:var(--gray-soft);color:var(--text)}
  .nl.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .ghbtn{border:1px solid var(--line);background:var(--surface);color:var(--text);padding:9px 15px;border-radius:9px;font-size:14px;font-weight:600;white-space:nowrap}
  .ghbtn:hover{border-color:var(--accent);text-decoration:none}

  /* context bar (filing selector) */
  .ctx{background:var(--surface);border-bottom:1px solid var(--line)}
  .ctxrow{display:flex;align-items:center;gap:8px;padding:15px 0;flex-wrap:wrap}
  .ctx .lbl{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-right:6px;font-weight:600}
  .pill{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 16px;cursor:pointer;transition:.14s;min-width:100px}
  .pill:hover{border-color:var(--accent)}
  .pill.active{border-color:var(--accent);background:var(--accent-soft)}
  .pill .t{font-weight:700;font-size:14px} .pill .n{color:var(--muted);font-size:11.5px}
  .pill.active .t{color:var(--accent)}
  .runbtn{margin-left:auto;border:1px solid var(--line);background:var(--surface);color:var(--text);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600}
  .runbtn:hover{border-color:var(--accent)}

  main{padding:30px 0 90px}
  /* headings */
  .phead{margin-bottom:20px}
  .phead h2{margin:0 0 6px;font-size:24px;letter-spacing:-.5px}
  .lead{margin:0;color:var(--muted);font-size:15px;max-width:760px}
  .eyebrow{color:var(--accent);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}

  /* cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:var(--shadow-sm);overflow-x:auto}
  .card h3{margin:0 0 3px;font-size:16px;letter-spacing:-.2px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .note{background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:12px 15px;color:var(--muted);font-size:13px;margin-bottom:16px}
  .note b{color:var(--text)}

  /* metric rail (ChartMogul style) */
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px}
  @media(max-width:820px){.metrics{grid-template-columns:repeat(2,1fr)}}
  .metric{background:var(--surface);padding:16px 18px}
  .metric .l{color:var(--muted);font-size:12px;margin-bottom:6px}
  .metric .v{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
  .metric .d{font-size:12px;font-weight:600;margin-top:3px}
  .d.up{color:var(--ok)} .d.down{color:var(--bad)} .d.flat{color:var(--muted)}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line2)}
  th{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-family:var(--mono)}
  tbody tr:hover{background:var(--surface2)}
  tbody tr:last-child td{border-bottom:none}
  .mono{font-family:var(--mono)} .muted{color:var(--muted)}

  .chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .chip.ok{background:var(--ok-soft);color:var(--ok)}
  .chip.bad{background:var(--bad-soft);color:var(--bad)}
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.gray{background:var(--gray-soft);color:var(--gray)}
  .chip.acc{background:var(--accent-soft);color:var(--accent)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:1px}

  /* hero (ChronoTask style) */
  .hero{position:relative;text-align:center;padding:50px 0 30px}
  .hero h1{font-size:54px;line-height:1.05;letter-spacing:-2px;margin:0 0 6px;font-weight:800}
  .hero h1 .g{color:var(--faint)}
  .hero p.tag{font-size:17px;color:var(--muted);max-width:620px;margin:14px auto 0}
  .hero .cta{display:inline-flex;gap:10px;margin-top:24px}
  .btn{background:var(--accent);color:#fff;border:none;padding:12px 22px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer}
  .btn:hover{filter:brightness(1.05);text-decoration:none}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--line)}
  .floats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:34px}
  .fcard{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px 16px;text-align:left;min-width:215px}
  .fcard .h{font-size:12px;color:var(--muted);margin-bottom:6px}
  .fcard .m{font-family:var(--mono);font-size:13px}

  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .three{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:820px){.two,.three{grid-template-columns:1fr}.hero h1{font-size:38px;letter-spacing:-1px}}
  .chain{font-family:var(--mono);font-size:12.5px;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:10px 13px;margin:7px 0}
  .chain .res{color:var(--accent);font-weight:600} .arrow{color:var(--faint)}
  .barrow{display:flex;align-items:center;gap:12px;margin:9px 0}
  .barrow .lab{width:230px;font-size:13px}
  .bar{flex:1;height:20px;background:var(--gray-soft);border-radius:6px;overflow:hidden}
  .bar>div{height:100%;background:linear-gradient(90deg,#f87171,#dc2626);border-radius:6px}
  .barrow .sc{width:42px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .err{background:var(--bad-soft);border:1px solid #f3c0c0;color:var(--bad);padding:11px 15px;border-radius:10px}
  .loading{color:var(--muted);padding:60px;text-align:center}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
  code{font-family:var(--mono);background:var(--gray-soft);padding:1px 6px;border-radius:5px;font-size:12px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-size:12.5px;margin-top:12px}
  .feat{padding:18px;border:1px solid var(--line);border-radius:14px;background:var(--surface);box-shadow:var(--shadow-sm)}
  .feat h4{margin:0 0 6px;font-size:15px} .feat p{margin:0;color:var(--muted);font-size:13.5px}
  .feat .ic{width:34px;height:34px;border-radius:9px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:17px;margin-bottom:12px}
  ul.clean{margin:6px 0 0;padding-left:18px;color:var(--muted)} ul.clean li{margin:7px 0}
  ul.clean b{color:var(--text)}
  /* badge */
  .badge{font-size:11.5px;font-weight:700;letter-spacing:.3px;color:var(--accent);background:var(--accent-soft);padding:4px 9px;border-radius:20px;margin-left:8px;vertical-align:2px}
  /* live search */
  .search{display:flex;align-items:center;gap:6px;margin-left:14px;padding-left:14px;border-left:1px solid var(--line)}
  .acwrap{position:relative}
  .search input{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:13px;width:300px;font-family:var(--sans);color:var(--text)}
  .search input:focus{outline:none;border-color:var(--accent)}
  .search .go{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer}
  .ac{position:absolute;top:42px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);z-index:60;max-height:340px;overflow:auto;display:none}
  .ac.show{display:block}
  .acitem{padding:9px 12px;cursor:pointer;display:flex;gap:10px;align-items:baseline;border-bottom:1px solid var(--line2)}
  .acitem:last-child{border-bottom:none}
  .acitem:hover,.acitem.sel{background:var(--accent-soft)}
  .acitem .tk{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--accent);min-width:62px}
  .acitem .nm{font-size:13px;color:var(--text)}
  .achint{padding:8px 12px;color:var(--faint);font-size:11.5px;border-top:1px solid var(--line2)}
  .runmsg{color:var(--accent);font-size:12.5px;font-weight:500;margin-left:auto;display:flex;align-items:center}
  .keywarn{margin-left:auto;color:var(--warn);background:var(--warn-soft);border:1px solid #f0d9a8;border-radius:8px;padding:6px 10px;font-size:12px}
  .keywarn code{background:rgba(0,0,0,.05)}
  /* charts */
  .chartgrid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
  @media(max-width:820px){.chartgrid{grid-template-columns:1fr}}
  .pbar{display:flex;height:26px;border-radius:7px;overflow:hidden;background:var(--gray-soft)}
  .pbar>div{height:100%}
  .obar{display:flex;align-items:center;gap:12px;margin:11px 0}
  .obar .who{width:160px;font-size:13px} .obar .who b{font-weight:700}
  .obar .pbar{flex:1;height:22px}
  .donutwrap{display:flex;align-items:center;gap:20px}
  .dlegend{font-size:13px} .dlegend div{margin:6px 0}
  .wfall{margin:6px 0 2px}
  .wbar{display:flex;height:34px;border-radius:8px;overflow:hidden;background:var(--gray-soft);border:1px solid var(--line)}
  .wbar>div{height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden}
  .wbar .gap{background:repeating-linear-gradient(45deg,#fde2e2,#fde2e2 6px,#f9caca 6px,#f9caca 12px);color:var(--bad)}
  .wflabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}
  .aside{background:var(--accent-soft);border:1px solid #cfdcff;border-radius:12px;padding:14px 16px;font-size:13px;color:#274690}
  .aside h4{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent)}
  .vuln{background:var(--bad-soft);border:1px solid #f3c0c0;border-radius:12px;padding:14px 16px;margin-bottom:16px}
  .vuln.clean{background:var(--ok-soft);border-color:#bfe6cb}
  .vuln h4{margin:0 0 4px;font-size:14px}
  .askinput{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:15px;font-family:var(--sans);color:var(--text)}
  .askinput:focus{outline:none;border-color:var(--accent)}
  .exrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .ex{font-size:12.5px;color:var(--accent);background:var(--accent-soft);border:1px solid #cfdcff;border-radius:20px;padding:5px 12px;cursor:pointer}
  .ex:hover{background:#dde7ff}
</style>
</head>
<body>
<div class="topbar"><div class="wrap nav">
  <div class="brand"><span class="logo"><i class="a"></i><i></i><i></i><i></i></span> tieout <span class="badge">BUILT FOR ROGO</span></div>
  <div class="navlinks" id="tabs"></div>
  <a class="ghbtn" href="https://github.com/harshini2212/Hebbia-Financial-Analyst" target="_blank">GitHub ↗</a>
</div></div>
<div class="ctx" id="ctxbar"><div class="wrap"><div class="ctxrow" id="filings"></div></div></div>
<main><div class="wrap" id="view"><div class="loading"><span class="spin"></span>Loading…</div></div></main>

<script>
const S={filings:[],analyses:{},registry:[],ticker:null,tab:'overview',busy:false,acResults:[],hasKey:true,searchText:'',isStatic:false,
  askQ:'',askResult:null,askBusy:false,askError:'',bench:null};
let _acTimer;
function doSearch(inp,box){
  clearTimeout(_acTimer);
  _acTimer=setTimeout(async()=>{
    const q=inp.value.trim();
    if(!q){S.acResults=[];box.classList.remove('show');return;}
    try{S.acResults=await fetch('/api/search?q='+encodeURIComponent(q)).then(r=>r.json());}
    catch(e){S.acResults=[];}
    if(!S.acResults.length){box.innerHTML='<div class="achint">No match on SEC EDGAR — try the company\'s legal name.</div>';box.classList.add('show');return;}
    box.innerHTML=S.acResults.map(r=>`<div class="acitem" data-tk="${r.ticker}"><span class="tk">${r.ticker}</span><span class="nm">${r.name}</span></div>`).join('')
      +'<div class="achint">Pick a company to pull its latest 10-K from SEC EDGAR and run it live (~30–60s).</div>';
    box.querySelectorAll('.acitem').forEach(el=>el.onmousedown=(ev)=>{ev.preventDefault();box.classList.remove('show');S.searchText=el.getAttribute('data-tk')+' — '+el.querySelector('.nm').textContent;runTicker(el.getAttribute('data-tk'));});
    box.classList.add('show');
  },180);
}
const TABS=[['overview','Overview'],['snapshot','Snapshot'],['ask','Verified cell'],['benchmark','Hybrid eval'],['explorer','Filing explorer'],['propagation','Propagation'],
  ['attribution','Attribution'],['localization','Localization'],['registry','Rulebook'],['approach','Approach']];
const NO_CTX=new Set(['overview','approach','benchmark']);

const $=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
function money(v,unit){
  if(v===null||v===undefined) return '—';
  if(unit==='ratio') return (v*100).toFixed(2)+'%';
  const a=Math.abs(v),s=v<0?'−':'';
  if(a>=1e9) return s+'$'+(a/1e9).toFixed(2)+'B';
  if(a>=1e6) return s+'$'+(a/1e6).toFixed(2)+'M';
  if(a>=1e3) return s+'$'+(a/1e3).toFixed(1)+'K';
  return s+'$'+a.toFixed(0);
}
function statusChip(st){const m={satisfied:['ok','✓ ties out'],violated:['bad','✗ breaks'],
  indeterminate:['gray','– n/a'],'n/a':['gray','—']};const[c,t]=m[st]||['gray',st];return `<span class="chip ${c}">${t}</span>`;}
function labelChip(l){const m={extraction_error:'bad',filing_inconsistency:'warn',constraint_model_error:'warn',undetermined:'gray'};
  return `<span class="chip ${m[l]||'gray'}">${l.replace(/_/g,' ')}</span>`;}
function sevChip(s){return s==='soft'?'<span class="chip gray">soft</span>':'<span class="chip acc">hard</span>';}
function pageHead(t,s){return `<div class="phead"><h2>${t}</h2><p class="lead">${s}</p></div>`;}
function metric(l,v,d,tone){return `<div class="metric"><div class="l">${l}</div><div class="v">${v}</div>${d?`<div class="d ${tone||'flat'}">${d}</div>`:''}</div>`;}
const CATCOLORS=['#2f6bff','#16a34a','#d97706','#7c3aed','#0891b2','#db2777','#65a30d'];
function pbar(parts){const tot=parts.reduce((s,p)=>s+p.v,0)||1;
  return `<div class="pbar">${parts.filter(p=>p.v>0).map(p=>`<div style="width:${p.v/tot*100}%;background:${p.c}" title="${p.t||''}"></div>`).join('')}</div>`;}
function donut(parts){const tot=parts.reduce((s,p)=>s+p.v,0)||1;const R=54,C=2*Math.PI*R;let off=0,segs='';
  parts.forEach(p=>{if(!p.v)return;const len=p.v/tot*C;
    segs+=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${p.c}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;off+=len;});
  return `<svg width="140" height="140" viewBox="0 0 140 140">${segs}
    <text x="70" y="66" text-anchor="middle" font-size="26" font-weight="700" fill="#0d1117">${tot}</text>
    <text x="70" y="84" text-anchor="middle" font-size="11" fill="#646b76">checks</text></svg>`;}
function legendRows(parts){return parts.map(p=>`<div><span class="dot" style="background:${p.c}"></span>${p.t} <b>${p.v}</b></div>`).join('');}
function waterfall(seg){
  const sum=seg.sum||1; let slices='';
  seg.members.forEach((m,i)=>{const w=m.value/sum*100;
    slices+=`<div style="width:${w}%;background:${CATCOLORS[i%CATCOLORS.length]}" title="${m.name}: ${money(m.value)}">${w>11?m.name.slice(0,12):''}</div>`;});
  let verdict='';
  if(seg.total!=null){const diff=seg.total-seg.sum;
    verdict=seg.reconciles
      ? `<span class="chip ok">✓ reconciles to total ${money(seg.total)}</span>`
      : `<span class="chip warn">differs ${money(Math.abs(diff))} · corporate &amp; eliminations</span>`;}
  return `<div class="wfall"><div class="wbar">${slices}</div>
    <div class="wflabels"><span>Σ segments = <b>${money(sum)}</b></span><span>${verdict}</span></div></div>`;}
function sparkBars(pts,color){
  const max=Math.max(...pts.map(p=>p.value))||1, w=26, gap=12, h=44;
  let s=''; pts.forEach((p,i)=>{const bh=Math.max(4,p.value/max*h);
    s+=`<rect x="${i*(w+gap)}" y="${h-bh}" width="${w}" height="${bh}" rx="3" fill="${color}"/>`
      +`<text x="${i*(w+gap)+w/2}" y="${h+13}" text-anchor="middle" font-size="9.5" fill="#8b929c">FY${String(p.year).slice(2)}</text>`;});
  return `<svg width="${pts.length*(w+gap)}" height="${h+18}">${s}</svg>`;}
// plain-English reasons a rule can't be checked on a given filing
const NRREASON={
  'bs.assets_split':'needs a current / non-current assets split this filing doesn\'t tag',
  'bs.liabilities_split':'needs a current / non-current liabilities split this filing doesn\'t tag',
  'bs.equity_attribution':'needs a noncontrolling-interest line not separately tagged',
  'is.gross_profit':'this filing doesn\'t report a gross-profit line',
  'is.operating_income':'depends on gross profit, which this filing doesn\'t report',
  'is.net_income_attribution':'needs a noncontrolling-interest split not tagged here',
  'rev.segments_sum':'segment revenue isn\'t tagged cleanly for this filer',
  'opinc.segments_sum':'segment operating income isn\'t tagged cleanly for this filer',
  'margin.gross':'a ratio the filing never states as data — computed on the Propagation tab',
  'margin.operating':'a ratio the filing never states as data — computed on the Propagation tab',
  'margin.net':'a ratio the filing never states as data — computed on the Propagation tab',
  'tax.effective_rate':'a ratio the filing never states as data — computed on the Propagation tab',
  'bs.balance':'a required balance-sheet line isn\'t tagged for this filing',
  'bs.lse_decomp':'a required balance-sheet line isn\'t tagged for this filing',
};

async function boot(){
  S.filings=await(await fetch('/api/filings')).json();
  S.ticker=S.filings[0].ticker;
  S.registry=await(await fetch('/api/registry')).json();
  try{const h=await(await fetch('/api/health')).json();S.hasKey=h.api_key;S.isStatic=!!h.static;}catch(e){S.hasKey=true;}
  await Promise.all(S.filings.map(async f=>{
    try{S.analyses[f.ticker]=await(await fetch('/api/analysis/'+f.ticker)).json();}
    catch(e){S.analyses[f.ticker]={error:String(e)};}
  }));
  renderChrome();render();
}
function renderChrome(){
  const tb=document.getElementById('tabs');tb.innerHTML='';
  TABS.forEach(([id,label])=>{const t=$(`<div class="nl ${id===S.tab?'active':''}">${label}</div>`);
    t.onclick=()=>{S.tab=id;renderChrome();render();window.scrollTo(0,0);};tb.appendChild(t);});

const STAGES=['Resolving ticker on SEC EDGAR…','Downloading the 10-K + XBRL…','Parsing the financial statements…','Extracting figures with Claude…','Checking accounting identities…'];
async function runTicker(t){
  t=(t||'').trim().toUpperCase(); if(!t||S.busy) return;
  S.busy=true; S.runmsg=STAGES[0]; renderChrome();
  let i=0; const timer=setInterval(()=>{i=(i+1)%STAGES.length;S.runmsg=STAGES[i];const m=document.querySelector('.runmsg');if(m)m.innerHTML='<span class="spin"></span>'+S.runmsg;},2200);
  try{
    const r=await fetch('/api/analysis/'+encodeURIComponent(t)+'/run',{method:'POST'});
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    const data=await r.json(); S.analyses[t]=data;
    if(!S.filings.find(f=>f.ticker===t)) S.filings.push({ticker:t,issuer:data.issuer,note:'live'});
    S.ticker=t; S.tab='snapshot'; S.searchText='';
  }catch(e){ alert('Could not run "'+t+'": '+e.message+'\n\nNeeds ANTHROPIC_API_KEY set on the server, and the ticker must file a 10-K on SEC EDGAR.'); }
  clearInterval(timer); S.busy=false; renderChrome(); render();
}
async function runLive(){
  if(S.busy)return;S.busy=true;renderChrome();
  try{const r=await fetch('/api/analysis/'+S.ticker+'/run',{method:'POST'});
    if(!r.ok)throw new Error((await r.json()).detail||r.statusText);
    S.analyses[S.ticker]=await r.json();}
  catch(e){alert('Live run failed: '+e.message+'\n(Needs ANTHROPIC_API_KEY for an uncached filing.)');}
  S.busy=false;renderChrome();render();
}

async function askCell(question){
  S.askBusy=true; S.askError=''; S.askResult=null; render();
  try{
    const r=await fetch('/api/ask/'+encodeURIComponent(S.ticker),{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({question})});
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    S.askResult=await r.json();
  }catch(e){ S.askError='Could not answer: '+e.message; }

}
function renderAsk(res){
  if(res.error) return $(`<div class="err">Agent error: ${res.error}</div>`);
  const v=res.verdict;
  const badge=v.trusted
    ? '<span class="chip ok">&#10003; Verified cell — figures tie to official data and the answer reconciles</span>'
    : '<span class="chip bad">&#9888; Unverified cell — see the failed check below</span>';
  const deriv=(res.derivation||[]).map(dd=>`<div class="chain"><span class="chip ${dd.type==='retrieval'?'acc':dd.type==='calculation'?'warn':'gray'}" style="margin-right:8px">${dd.type}</span>${dd.text}</div>`).join('')||'<div class="muted">—</div>';
  let checks='';
  (v.checks||[]).forEach(c=>{const m=c.ok===null?'<span class="chip gray">n/a</span>':(c.ok?'<span class="chip ok">&#10003;</span>':'<span class="chip bad">&#10007;</span>');
    checks+=`<tr><td>${c.label||''}</td><td class="mono">${c.concept||''}</td><td class="num">${c.stated==null?'':money(c.stated)}</td><td class="num">${c.truth==null?'':money(c.truth)}</td><td>${m}</td></tr>`;});
  // self-consistency: does the stated answer follow from the cited figures via the identities?
  let calc='';
  if(v.calc_status==='corroborated') calc=`<div class="note" style="margin-top:12px"><span class="chip ok">&#10003; self-consistent</span> the accounting identities derive the stated answer from the cited figures.</div>`;
  else if(v.calc_status==='contradicted') calc=`<div class="vuln" style="margin-top:12px"><h4>✗ Not self-consistent</h4><div class="muted">From the cited figures the identities derive <b>${v.derived_value}</b>, not the stated answer — the multi-step reasoning doesn't reconcile.</div></div>`;
  // accounting identities the cell's own figures touch
  let idens='';
  (v.identities||[]).forEach(ic=>{const chip=ic.status==='satisfied'?'<span class="chip ok">&#10003; ties out</span>':`<span class="chip bad">&#10007; breaks</span> ${ic.label?labelChip(ic.label):''}`;
    idens+=`<tr><td>${ic.description}</td><td>${chip}</td><td class="muted" style="font-size:12px">${ic.evidence||''}</td></tr>`;});
  const idenCard=idens?`<h4 style="margin:18px 0 6px;font-size:13px">Accounting identities the cited figures touch</h4>
    <table><thead><tr><th>Identity</th><th>Result</th><th>Detail</th></tr></thead><tbody>${idens}</tbody></table>`:'';
  return $(`<div class="card"><div style="margin-bottom:10px">${badge}</div>
    <h3 style="font-size:20px;margin:0 0 2px">${res.answer}</h3>
    <div class="sub">The column agent made ${res.tool_calls} grounded retrieval(s) via tool calls${res.answer_concept?` · answer maps to <code>${res.answer_concept}</code>`:''}.</div>
    ${calc}
    <h4 style="margin:14px 0 6px;font-size:13px">Derivation (retrieval → definition → calculation)</h4>${deriv}
    <h4 style="margin:18px 0 6px;font-size:13px">Cited figures checked against official XBRL</h4>
    <table><thead><tr><th>Figure</th><th>Concept</th><th class="num">Agent</th><th class="num">Official</th><th>Match</th></tr></thead><tbody>${checks}</tbody></table>
    ${idenCard}</div>`);
}

    else B.notrep.push(c);
  });
  const verdict=`We checked <b>${a.constraints.length}</b> accounting rules against ${a.issuer}'s filing. `
    +`<b style="color:var(--ok)">${B.verified.length} verified${B.problem.length?'':' — all hold'}</b>`
    +(B.problem.length?`, <b style="color:var(--bad)">${B.problem.length} problem${B.problem.length>1?'s':''}</b>`:'')
    +`, and <b>${B.notrep.length} not reported</b> (the filing doesn't contain the figures those rules need).`;
  el.appendChild($(`<div class="note" style="font-size:14px">${verdict}</div>`));

  if(B.verified.length){
    const rows=B.verified.map(c=>`<tr><td><div>${c.description}</div>
      <div class="muted mono" style="font-size:11px">${c.formula}</div></td>
      <td class="num">${c.gt_residual!==null?money(c.gt_residual):''}</td>
      <td><span class="chip ok">&#10003; holds</span></td></tr>`).join('');
    el.appendChild($(`<div class="card"><h3>&#10003; Verified — ${B.verified.length} rules hold</h3>
      <div class="sub">All inputs present and the two sides reconcile (residual within the rounding-aware tolerance).</div>
      <table><thead><tr><th>Identity</th><th class="num">residual</th><th>Result</th></tr></thead><tbody>${rows}</tbody></table></div>`));
  }
  if(B.problem.length){
    const rows=B.problem.map(c=>{const at=a.attribution.find(x=>x.id===c.id)||{};
      return `<tr><td><div>${c.description}</div><div class="muted mono" style="font-size:11px">${c.formula}</div></td>
        <td>${at.label?labelChip(at.label):'<span class="chip bad">breaks</span>'}</td>
        <td class="muted" style="font-size:12px">${at.evidence||''}</td></tr>`;}).join('');
    el.appendChild($(`<div class="card"><h3>Problems — ${B.problem.length}</h3>
      <div class="sub">Inputs are present, but the numbers don't reconcile — shown with the attributed cause.</div>
      <table><thead><tr><th>Identity</th><th>Verdict</th><th>Why</th></tr></thead><tbody>${rows}</tbody></table></div>`));
  }
  if(B.notrep.length){
    const rows=B.notrep.map(c=>`<tr><td>${c.description}</td>
      <td class="muted" style="font-size:12px">${NRREASON[c.id]||"the filing doesn't report all the line items this rule needs"}</td></tr>`).join('');
    el.appendChild($(`<div class="card"><details><summary style="cursor:pointer;font-weight:600;font-size:15px">Not reported — ${B.notrep.length} rules (click to expand)</summary>
      <div class="sub" style="margin-top:10px">Not failures — the tool refuses to grade rules whose figures aren't in this filing.</div>
      <table><thead><tr><th>Identity</th><th>Why it can't be checked here</th></tr></thead><tbody>${rows}</tbody></table></details></div>`));
  }

  const fc=$(`<div class="card"><h3>Did Claude read the numbers right?</h3>
    <div class="sub">Each consolidated figure Claude pulled from the prose, checked against the SEC's structured value.</div></div>`);
  let frows='';
  a.facts.forEach(f=>{const m=f.agree===null?'<span class="chip gray">no tag</span>':(f.agree?'<span class="chip ok">✓ match</span>':'<span class="chip bad">✗ off</span>');
    frows+=`<tr><td class="mono">${f.concept}</td><td class="num">${money(f.text)}</td>
      <td class="num">${money(f.xbrl)}</td><td>${m}</td></tr>`;});
  fc.appendChild($(`<table><thead><tr><th>Line item</th><th class="num">Claude (from text)</th>
    <th class="num">Official (XBRL)</th><th>Match</th></tr></thead><tbody>${frows}</tbody></table>`));
  el.appendChild(fc);
  return el;
}

/* ---------- Propagation ---------- */
function vProp(){
  const g=guard();if(g)return g;const a=d();const el=$('<div></div>');
  el.appendChild($(pageHead('Propagation — the graph fills the gaps',
    'The identities share variables, so when one value is missing the tool solves for it instead of giving up. Each derived number carries its formula — the citation trail an autonomous analyst needs.')));
  el.appendChild($(`<div class="note">Example: ${a.issuer} never printed its gross margin. The graph derived
    it from <code>revenue − cost</code>, then computed the ratio — values that were never in the filing.</div>`));
  const c=$('<div class="card"><h3>Figures derived for FY'+a.fiscal_year+'</h3></div>');
  if(!a.propagation.length){c.appendChild($('<div class="muted">No derived facts for this filing.</div>'));}
  a.propagation.forEach(p=>{c.appendChild($(`<div class="chain"><span class="res">${p.concept}</span> = <b>${money(p.value,p.unit)}</b>
    <span class="arrow"> ← </span>${p.op} <span class="muted">(${p.inputs} inputs)</span></div>`));});
  el.appendChild(c);return el;
}

/* ---------- Attribution ---------- */
function vAttr(){
  const g=guard();if(g)return g;const a=d();const el=$('<div></div>');
  el.appendChild($(pageHead('Attribution — whose fault is it?',
    "Most tools just say 'wrong.' When an identity breaks, tieout uses the filing's official data to decide the actual cause — so a real model error isn't confused with a filing quirk or an incomplete rule.")));
  el.appendChild($(`<div class="card"><h3>The decision logic</h3>
    <table><thead><tr><th>Official data…</th><th>vs. the text…</th><th>→ verdict</th></tr></thead><tbody>
    <tr><td>satisfies the identity</td><td>a figure disagrees</td><td>${labelChip('extraction_error')}</td></tr>
    <tr><td>breaks the identity itself</td><td>—</td><td>${labelChip('filing_inconsistency')}</td></tr>
    <tr><td>satisfies, text matches it</td><td>rule still fires</td><td>${labelChip('constraint_model_error')}</td></tr>
    <tr><td>incomplete</td><td>—</td><td>${labelChip('undetermined')}</td></tr>
    </tbody></table></div>`));
  const ac=$(`<div class="card"><h3>Verdicts for ${a.ticker} (Claude)</h3></div>`);
  if(!a.attribution.length){ac.appendChild($('<div class="note">No attributable violations — Claude\'s extraction reconciles cleanly against the official data.</div>'));}
  a.attribution.forEach(x=>{ac.appendChild($(`<div style="margin:12px 0"><code>${x.id}</code> ${labelChip(x.label)}
    <div class="muted mono" style="font-size:11.5px;margin-top:5px">${x.evidence}</div></div>`));});
  el.appendChild(ac);return el;
}

/* ---------- Localization ---------- */
function vLoc(){
  const g=guard();if(g)return g;const a=d();const el=$('<div></div>');const L=a.localization;
  el.appendChild($(pageHead('Localization — pointing at the culprit',
    'We inject a fake $5B error into one segment, then rank suspects by how few satisfied identities vouch for each figure. It also stays honest about what it cannot pinpoint.')));
  const c=$('<div class="card"></div>');
  if(!L){c.appendChild($('<div class="muted">No segment data to run the localization demo for this filing.</div>'));el.appendChild(c);return el;}
  c.appendChild($(`<div class="note">Injected <b>+$5B</b> into segment <code>${L.injected_segment}</code> →
    <code>rev.segments_sum</code> ${statusChip('violated')} with residual <b class="mono">${money(L.residual)}</b>.</div>`));
  const max=Math.max(...L.suspects.map(s=>s.score),0.0001);
  L.suspects.forEach(s=>{c.appendChild($(`<div class="barrow"><div class="lab">${s.segment}
    <span class="muted mono" style="font-size:11px">${money(s.value)}</span></div>
    <div class="bar"><div style="width:${(s.score/max*100).toFixed(0)}%"></div></div><div class="sc">${s.score.toFixed(2)}</div></div>`));});
  c.appendChild($(`<div class="legend"><span>Taller bar = more suspect. The consolidated total is exonerated
    (vouched by the margin identities). Honest limit: sibling segments share no other identity, so isolating a single one needs a cross-period signal.</span></div>`));
  el.appendChild(c);return el;
}

/* ---------- Rulebook (registry) ---------- */
function vRegistry(){
  const el=$('<div></div>');
  el.appendChild($(pageHead('The rulebook',
    `${S.registry.length} universal accounting identities, hand-authored once and bound to each filing. Tolerance is rounding-aware and source-aware (tight for official data, looser for prose).`)));
  let rows='';
  S.registry.forEach(r=>{rows+=`<tr><td class="mono">${r.id}</td><td>${r.description}</td>
    <td class="mono muted" style="font-size:11.5px">${r.formula}</td><td>${sevChip(r.severity)}</td></tr>`;});
  el.appendChild($(`<div class="card"><table><thead><tr><th>ID</th><th>Identity</th><th>Formula</th><th>Type</th></tr></thead><tbody>${rows}</tbody></table></div>`));
  return el;
}

/* ---------- Approach (Hebbia framing + differentiation + learnings) ---------- */
function vApproach(){
  const el=$('<div></div>');
  el.appendChild($(pageHead('Approach',
    'Why this exists, how it maps onto what Hebbia is building, and what made it hard.')));

  el.appendChild($(`<div class="two">
    <div class="feat"><div class="ic">◎</div><h4>What Hebbia builds</h4>
      <p>Matrix — documents as rows, questions as columns, and a swarm of agents filling each <b>cell</b> with a
      cited answer over filings, contracts and transcripts. The product's value rests entirely on those cells being
      <b>trustworthy</b>; today that trust comes from citations and rubric / LLM-judge evaluation.</p></div>
    <div class="feat"><div class="ic">⊨</div><h4>What this adds</h4>
      <p>The missing leg of that trust: a deterministic check that a cell's figures actually obey accounting —
      cross-figure identities, three-way attribution, and a self-consistency test that the answer follows from the
      cited numbers. The guardrail you can't get from a second AI grading the first.</p></div>
  </div>`));

  el.appendChild($(`<div class="card"><h3>What we did differently</h3>
    <ul class="clean">
      <li><b>Not LLM-as-judge.</b> The usual way to grade AI output is to ask another AI — which rubber-stamps
        plausible-but-wrong numbers. We grade with <b>deterministic accounting math</b> instead.</li>
      <li><b>The filing grades itself.</b> We use each filing's own official XBRL data as the answer key —
        free, exact ground truth, no manual labelling.</li>
      <li><b>A constraint graph, not a checklist.</b> Because the rules share variables, the tool can
        <b>propagate</b> — fill missing values and cross-check — not just pass/fail.</li>
      <li><b>Attribution, not just detection.</b> A three-way “whose fault” verdict, the part most tools skip.</li>
    </ul></div>`));

  el.appendChild($(`<div class="card"><h3>What we learned (the honest part)</h3>
    <ul class="clean">
      <li><b>Not crying wolf is harder than catching errors.</b> Real filings broke a naive checker — Kraft
        Heinz's $12M mezzanine equity, Amazon's $554M equity-method income, 3M's $1.4B discontinued operations,
        3M's $24B segment double-count. Modelling real accounting structure was ~80% of the work.</li>
      <li><b>Be honest about what a result shows.</b> The flashy “$38B catch” was partly a context-window
        artifact — with full context Claude is accurate. So it's a <b>verifier first</b> that also catches errors
        under weaker conditions, not a gotcha machine.</li>
      <li><b>A true “filing inconsistency” is rare</b> in audited filings — most apparent ones are really your
        own rule being incomplete. Knowing the difference is the whole game.</li>
      <li><b>Engineering rigor:</b> reproducible via content-addressed caching, rounding-aware tolerance, and
        edge cases like 52/53-week fiscal years (Amazon's FY2025 ends Jan 1, 2026).</li>
    </ul></div>`));

  el.appendChild($(`<div class="card"><h3>How it works, end to end</h3>
    <div class="three">
      <div><b>1 · Ingest</b><p class="muted" style="font-size:13px">Pull a filing from SEC EDGAR — official XBRL (ground truth) and raw text (what the AI reads).</p></div>
      <div><b>2 · Extract &amp; verify</b><p class="muted" style="font-size:13px">Claude / baseline / XBRL pull the numbers; 16 identities check them with interval tolerance.</p></div>
      <div><b>3 · Explain</b><p class="muted" style="font-size:13px">Propagate to fill gaps, localize the culprit, and attribute every break three ways.</p></div>
    </div></div>`));
  return el;
}

boot();
