<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>tieout — eval-first document intelligence over SEC filings</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --panel2:#fbfcfd;
    --line:#e3e6eb; --line2:#eef1f4;
    --ink:#0f172a; --ink2:#334155; --muted:#64748b; --faint:#94a3b8;
    --accent:#2348b8; --accent-soft:#eaf0ff;
    --ok:#15803d; --ok-soft:#e7f4ec; --warn:#b45309; --warn-soft:#fbf0e2;
    --bad:#b91c1c; --bad-soft:#fbeaea; --slate:#475569; --slate-soft:#eef2f6;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,Menlo,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.06);
    --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1240px;margin:0 auto;padding:0 26px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .ulabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:600}

  /* top bar */
  .topbar{background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .nav{display:flex;align-items:center;gap:18px;height:58px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;letter-spacing:-.3px;flex-shrink:0}
  .logo{display:grid;grid-template-columns:repeat(2,8px);grid-auto-rows:8px;gap:2px}
  .logo i{border-radius:2px;background:var(--ink)} .logo i.a{background:var(--accent)}
  .brand .tag{font-weight:400;font-size:12px;color:var(--faint);border-left:1px solid var(--line);padding-left:10px;margin-left:1px}
  .navlinks{display:flex;gap:2px;flex:1;min-width:0;overflow-x:auto}
  .navlinks::-webkit-scrollbar{height:0}
  .nl{padding:7px 12px;border-radius:7px;color:var(--muted);cursor:pointer;white-space:nowrap;font-size:13px;font-weight:500}
  .nl:hover{background:var(--slate-soft);color:var(--ink)}
  .nl.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .ghbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600;white-space:nowrap;flex-shrink:0}
  .ghbtn:hover{border-color:var(--accent);text-decoration:none}

  /* status ribbon */
  .ribbon{background:var(--panel);border-bottom:1px solid var(--line)}
  .ribrow{display:flex;align-items:stretch;gap:0;height:46px;overflow-x:auto}
  .ribrow::-webkit-scrollbar{height:0}
  .kpi{display:flex;flex-direction:column;justify-content:center;padding:0 18px 0 0;margin-right:18px;border-right:1px solid var(--line2);white-space:nowrap}
  .kpi:last-child{border-right:none}
  .kpi .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600}
  .kpi .v{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
  .kpi .v.ok{color:var(--ok)} .kpi .v.warn{color:var(--warn)}

  main{padding:24px 0 90px}
  .phead{margin-bottom:18px}
  .phead h1{margin:0 0 4px;font-size:20px;letter-spacing:-.3px;font-weight:700}
  .phead p{margin:0;color:var(--muted);font-size:13px;max-width:820px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-sm);margin-bottom:16px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
  .panel .ph h3{margin:0;font-size:13.5px;font-weight:650}
  .panel .ph .sub{color:var(--faint);font-size:12px;margin-left:auto;font-weight:400}
  .panel .pb{padding:16px}
  .panel.flush .pb{padding:0}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 14px;border-bottom:1px solid var(--line2)}
  th{color:var(--faint);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.hover:hover{background:var(--panel2)}

  /* chips */
  .chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;font-family:var(--sans)}
  .chip.ok{background:var(--ok-soft);color:var(--ok)}
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.bad{background:var(--bad-soft);color:var(--bad)}
  .chip.slate{background:var(--slate-soft);color:var(--slate)}
  .chip.acc{background:var(--accent-soft);color:var(--accent)}
  .chip.ghost{background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)} .dot.slate{background:var(--slate)}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:15px 16px;box-shadow:var(--shadow-sm)}
  .kc .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;margin-bottom:9px}
  .kc .v{font-family:var(--mono);font-size:27px;font-weight:650;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
  .kc .d{font-size:11.5px;color:var(--muted);margin-top:7px}
  .kc.good .v{color:var(--ok)} .kc.flag .v{color:var(--warn)}

  /* query grid */
  .gridscroll{overflow-x:auto}
  table.grid{font-size:12.5px}
  table.grid th{position:sticky;top:0;background:var(--panel);z-index:1}
  table.grid td,table.grid th{border-right:1px solid var(--line2);padding:0}
  table.grid td:last-child,table.grid th:last-child{border-right:none}
  table.grid th.rowh,table.grid td.rowh{text-align:left;padding:10px 14px;min-width:188px;position:sticky;left:0;background:var(--panel);z-index:2;border-right:1px solid var(--line)}
  table.grid th.colh{padding:9px 12px;text-align:left;min-width:118px;vertical-align:bottom}
  table.grid th.colh .cc{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:none;letter-spacing:0;font-weight:400}
  .gcell{padding:10px 12px;cursor:pointer;display:block;min-height:54px}
  .gcell:hover{background:var(--panel2)}
  .gcell .val{font-family:var(--mono);font-size:13.5px;font-weight:600;font-variant-numeric:tabular-nums}
  .gcell .meta{display:flex;align-items:center;gap:6px;margin-top:5px}
  .gcell.s-verified{box-shadow:inset 3px 0 0 var(--ok)}
  .gcell.s-low_confidence{box-shadow:inset 3px 0 0 var(--warn);background:var(--warn-soft)}
  .gcell.s-abstained{box-shadow:inset 3px 0 0 var(--slate);background:var(--slate-soft)}
  .gcell.s-error{box-shadow:inset 3px 0 0 var(--bad);background:var(--bad-soft)}
  .gcell .tier{font-size:10px;color:var(--faint);font-family:var(--mono)}
  .rowh .tk{font-weight:700;font-family:var(--mono)} .rowh .nm{color:var(--muted);font-size:11.5px}
  .esc{font-size:10px;color:var(--warn);font-weight:700;font-family:var(--mono)}

  /* inspector drawer */
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:40;opacity:0;pointer-events:none;transition:opacity .15s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:540px;max-width:94vw;background:var(--panel);border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(15,23,42,.12);z-index:50;transform:translateX(100%);transition:transform .18s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer .dh{padding:16px 20px;border-bottom:1px solid var(--line)}
  .drawer .db{padding:18px 20px;overflow-y:auto;flex:1}
  .drawer .x{position:absolute;top:14px;right:18px;cursor:pointer;color:var(--faint);font-size:20px;line-height:1;border:none;background:none}
  .drawer .x:hover{color:var(--ink)}
  .sec{margin-bottom:22px}
  .sec h4{margin:0 0 9px;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kv .item{background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:7px 11px;min-width:84px}
  .kv .item .k{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
  .kv .item .v{font-family:var(--mono);font-size:13px;font-weight:600;margin-top:2px}

  /* trace timeline */
  .trace{position:relative;margin-left:6px;padding-left:18px;border-left:2px solid var(--line)}
  .tev{position:relative;margin-bottom:11px}
  .tev:before{content:'';position:absolute;left:-25px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--panel);border:2px solid var(--faint)}
  .tev.plan:before,.tev.route:before{border-color:var(--accent)}
  .tev.verify:before{border-color:var(--slate)}
  .tev.gate:before{border-color:var(--warn)}
  .tev.gate.pass:before{border-color:var(--ok)}
  .tev .st{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:var(--faint)}
  .tev .dt{font-size:12.5px;color:var(--ink2);margin-top:1px}
  .tev .dt .em{font-family:var(--mono);font-size:11.5px}

  .attempt{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--line2);border-radius:8px;margin-bottom:7px;font-size:12px}
  .attempt .tier{font-family:var(--mono);font-weight:700;min-width:74px}
  .attempt .grow{flex:1;color:var(--muted)}
  .attempt.fail{background:var(--warn-soft);border-color:#f0dcbf}
  .attempt.pass{background:var(--ok-soft);border-color:#bfe6cb}

  .note{background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:11px 14px;color:var(--muted);font-size:12.5px;margin-bottom:14px}
  .note b{color:var(--ink)}
  .callout{background:var(--accent-soft);border:1px solid #cfdcff;border-radius:9px;padding:12px 15px;font-size:12.5px;color:#22356f}
  .callout b{color:var(--accent)}
  code{font-family:var(--mono);background:var(--slate-soft);padding:1px 5px;border-radius:4px;font-size:11.5px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:11.5px;padding:11px 16px;border-top:1px solid var(--line2)}
  .legend span{display:flex;align-items:center;gap:6px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
  .loading{color:var(--muted);padding:50px;text-align:center}

  /* architecture */
  .arch{display:flex;flex-direction:column;gap:8px}
  .layer{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:9px;padding:11px 15px;background:var(--panel2);position:relative}
  .layer .lz{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;min-width:118px}
  .layer .lt{font-size:13px;font-weight:600}
  .layer .ld{color:var(--muted);font-size:12px;margin-left:auto;text-align:right;max-width:430px}
  .layer.gate{border-color:var(--accent);background:var(--accent-soft);box-shadow:0 0 0 1px var(--accent-soft)}
  .layer.gate .lt{color:var(--accent)}
  .down{text-align:center;color:var(--faint);font-size:13px;line-height:.6}
  .rm td .chip{margin-right:4px}
</style>
</head>
<body>
<div class="topbar"><div class="wrap nav">
  <div class="brand"><span class="logo"><i class="a"></i><i></i><i></i><i></i></span> tieout
    <span class="tag">eval-first document intelligence · SEC filings</span></div>
  <div class="navlinks" id="tabs"></div>
  <a class="ghbtn" href="https://github.com/harshini2212/Hebbia-Financial-Analyst" target="_blank">GitHub ↗</a>
</div></div>
<div class="ribbon"><div class="wrap"><div class="ribrow" id="ribbon"></div></div></div>
<main><div class="wrap" id="view"></div></main>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>

<script>
const S={tab:'grid',grid:null,bench:null,registry:[],hasKey:true,isStatic:false,inspect:null,busy:false};
const $=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
const TABS=[['grid','Query Grid'],['eval','Eval'],['rulebook','Rulebook'],['arch','Architecture']];

function pct(v){return v==null?'—':(v*100).toFixed(v*100>=10?1:2)+'%';}
function money(v){if(v==null)return '—';const a=Math.abs(v),s=v<0?'−':'';
  if(a>=1e9)return s+'$'+(a/1e9).toFixed(2)+'B';if(a>=1e6)return s+'$'+(a/1e6).toFixed(1)+'M';
  if(a>=1e3)return s+'$'+(a/1e3).toFixed(0)+'K';return s+'$'+a.toFixed(0);}
function fmtVal(v,u){return v==null?'—':(u==='ratio'?pct(v):money(v));}
function usd(v){return v==null?'—':(v===0?'$0':'$'+v.toFixed(v<0.01?4:3));}
function tier(t){return (t||'').replace('claude-','').replace('-4-8',' 4.8').replace('-4-6',' 4.6').replace('-4-5',' 4.5').replace(/\b\w/g,c=>c.toUpperCase());}
const STATUS={verified:['ok','verified'],low_confidence:['warn','low-confidence'],abstained:['slate','abstained'],error:['bad','error']};
function statusChip(s){const[c,t]=STATUS[s]||['ghost',s];return `<span class="chip ${c}"><span class="dot ${c}"></span>${t}</span>`;}
function labelChip(l){if(!l)return '';const m={extraction_error:'bad',filing_inconsistency:'warn',constraint_model_error:'warn',undetermined:'slate'};
  return `<span class="chip ${m[l]||'ghost'}">${l.replace(/_/g,' ')}</span>`;}

async function boot(){
  try{const h=await(await fetch('/api/health')).json();S.hasKey=h.api_key;S.isStatic=!!h.static;}catch(e){}
  const j=async(u)=>{try{return await(await fetch(u)).json();}catch(e){return null;}};
  [S.grid,S.bench,S.registry]=await Promise.all([j('/api/grid'),j('/api/benchmark'),j('/api/registry')]);
  S.registry=S.registry||[];
  renderChrome();render();
}
function renderChrome(){
  const tb=document.getElementById('tabs');tb.innerHTML='';
  TABS.forEach(([id,label])=>{const t=$(`<div class="nl ${id===S.tab?'active':''}">${label}</div>`);
    t.onclick=()=>{S.tab=id;closeInspect();renderChrome();render();window.scrollTo(0,0);};tb.appendChild(t);});
  renderRibbon();
}
function renderRibbon(){
  const r=document.getElementById('ribbon');const m=(S.grid||{}).metrics||{};
  const cells=[
    ['filings × questions',((S.grid||{}).rows||[]).length+' × '+((S.grid||{}).columns||[]).length,''],
    ['tie-out vs XBRL',m.tie_out_accuracy==null?'—':pct(m.tie_out_accuracy),m.tie_out_accuracy>=1?'ok':''],
    ['hallucination',m.hallucination_rate==null?'—':pct(m.hallucination_rate),m.hallucination_rate===0?'ok':'warn'],
    ['grounding',m.grounding_rate==null?'—':pct(m.grounding_rate),m.grounding_rate>=1?'ok':''],
    ['gate escalations',(m.gate?m.gate.escalated:0)+'',''],
    ['grid cost',m.cost_usd==null?'—':usd(m.cost_usd),''],
  ];
  r.innerHTML=cells.map(([k,v,c])=>`<div class="kpi"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join('');
}
function render(){const v=document.getElementById('view');
  v.innerHTML='';v.appendChild(({grid:vGrid,eval:vEval,rulebook:vRulebook,arch:vArch}[S.tab]||vGrid)());}

/* ---------- Query Grid ---------- */
function vGrid(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Query Grid</h1>
    <p>Documents (rows) × questions (columns). Every cell is run through the <b>eval gate</b> — generated by a tiered agent, then accepted only if it ties out to the filing's own XBRL ground truth and the cited figures reconcile. Cells that fail are re-run on a stronger model; cells that never pass are surfaced as low-confidence, never as a confident wrong answer. Click any cell to inspect the trace, grounding, and gate decisions.</p></div>`));
  const g=S.grid;
  if(!g||!g.rows||!g.rows.length){
    el.appendChild($(`<div class="note">No grid computed yet. Run <code>python scripts/run_grid.py</code> (needs an API key) to populate <code>data/web/grid.json</code>.</div>`));
    return el;
  }
  const cols=g.columns;
  let head=`<tr><th class="rowh">Filing</th>`+cols.map(c=>`<th class="colh">${c.label}<div class="cc">${c.concept}</div></th>`).join('')+`</tr>`;
  let body='';
  g.rows.forEach(r=>{
    body+=`<tr><td class="rowh"><div class="tk">${r.ticker}</div><div class="nm">${r.issuer} · FY${r.fiscal_year}</div></td>`;
    cols.forEach(c=>{
      const cell=(g.cells[r.ticker]||{})[c.id];
      if(!cell){body+=`<td><span class="gcell muted">—</span></td>`;return;}
      const esc=cell.attempts&&cell.attempts.length>1?`<span class="esc" title="escalated">↑${cell.attempts.length}</span>`:'';
      body+=`<td><span class="gcell s-${cell.status}" data-t="${r.ticker}" data-q="${c.id}">
        <span class="val">${fmtVal(cell.value,c.unit)}</span>
        <span class="meta">${statusChip(cell.status)}${esc}</span>
        <span class="tier">${tier(cell.final_tier)}</span></span></td>`;
    });
    body+='</tr>';
  });
  const panel=$(`<div class="panel flush"><div class="gridscroll"><table class="grid"><thead>${head}</thead><tbody>${body}</tbody></table></div>
    <div class="legend">
      <span><span class="dot ok"></span>verified — ties out to XBRL + reconciles</span>
      <span><span class="dot warn"></span>low-confidence — failed the gate across tiers</span>
      <span><span class="dot slate"></span>abstained — no ground truth, correctly declined</span>
      <span class="mono faint">↑N = escalated through N tiers</span>
    </div></div>`);
  panel.querySelectorAll('.gcell[data-t]').forEach(c=>c.onclick=()=>openInspect(c.getAttribute('data-t'),c.getAttribute('data-q')));
  el.appendChild(panel);
  return el;
}

/* ---------- cell inspector ---------- */
function openInspect(t,q){S.inspect={t,q};drawInspect();}
function closeInspect(){S.inspect=null;document.getElementById('scrim').classList.remove('show');document.getElementById('drawer').classList.remove('show');}
function drawInspect(){
  const{t,q}=S.inspect;const g=S.grid;const cell=(g.cells[t]||{})[q];const col=g.columns.find(c=>c.id===q);
  const row=g.rows.find(r=>r.ticker===t);const gold=(g.gold[t]||{})[col.concept];
  const d=document.getElementById('drawer');
  const tieChip=cell.tie_out==='ok'?'<span class="chip ok">ties out ✓</span>'
    :cell.tie_out==='off'?'<span class="chip bad">does not tie out ✗</span>'
    :cell.tie_out==='no_gold'?'<span class="chip slate">no XBRL ground truth</span>'
    :cell.tie_out==='abstained'?'<span class="chip slate">declined</span>':'';
  const trace=cell.trace.map(e=>{
    const pass=e.step==='gate'&&/accept|abstention/.test(e.detail);
    return `<div class="tev ${e.step}${pass?' pass':''}"><div class="st">${e.step}${e.tier?' · '+tier(e.tier):''}</div>
      <div class="dt">${escapeHtml(e.detail)}</div></div>`;}).join('');
  const checks=(cell.checks||[]).map(c=>{const m=c.ok==null?'<span class="chip ghost">n/a</span>':(c.ok?'<span class="chip ok">match</span>':'<span class="chip bad">off</span>');
    return `<tr><td>${c.label||''}</td><td class="mono faint">${c.concept||''}</td><td class="num">${c.stated==null?'':money(c.stated)}</td><td class="num">${c.truth==null?'':money(c.truth)}</td><td>${m}</td></tr>`;}).join('');
  const idens=(cell.identities||[]).map(ic=>{const sc=ic.status==='satisfied'?'<span class="chip ok">ties out</span>':'<span class="chip bad">breaks</span> '+labelChip(ic.label);
    return `<tr><td>${ic.description}</td><td>${sc}</td></tr>`;}).join('');
  const attempts=(cell.attempts||[]).map((a,i)=>{
    const passed=a.trusted&&a.tie_out!=='off';const isLast=i===cell.attempts.length-1;
    const cls=passed&&isLast&&cell.status==='verified'?'pass':(passed?'':'fail');
    const verdict=a.note?('error: '+a.note):`retrieval ${a.retrieval_ok?'ok':'off'} · self-consistency ${a.calc_status}${a.tie_out!=='no_gold'?' · tie-out '+a.tie_out:''}`;
    return `<div class="attempt ${cls}"><span class="tier">${a.model_label}</span>
      <span class="grow">${verdict}</span>
      <span class="mono faint">${a.cache_hit?'cached':(a.input_tokens+a.output_tokens)+' tok'}</span>
      <span class="mono">${usd(a.est_cost_usd)}</span></div>`;}).join('');
  d.innerHTML=`<button class="x" onclick="closeInspect()">×</button>
    <div class="dh">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">${statusChip(cell.status)} ${tieChip}</div>
      <div style="font-size:11px" class="ulabel">${t} · ${row.issuer} · FY${cell.fiscal_year}</div>
      <div style="font-size:15px;font-weight:650;margin-top:3px">${col.label}</div>
      <div class="muted" style="font-size:12.5px;margin-top:3px">${escapeHtml(cell.question)}</div>
      <div class="kv">
        <div class="item"><div class="k">answer</div><div class="v">${fmtVal(cell.value,col.unit)}</div></div>
        <div class="item"><div class="k">XBRL truth</div><div class="v">${fmtVal(gold,col.unit)}</div></div>
        <div class="item"><div class="k">confidence</div><div class="v">${(cell.confidence*100).toFixed(0)}%</div></div>
        <div class="item"><div class="k">final tier</div><div class="v">${tier(cell.final_tier)}</div></div>
        <div class="item"><div class="k">cost</div><div class="v">${usd(cell.cost_usd)}</div></div>
      </div>
    </div>
    <div class="db">
      <div class="sec"><h4>Answer</h4><div style="font-size:13.5px">${escapeHtml(cell.answer)||'<span class=muted>—</span>'}</div></div>
      <div class="sec"><h4>Reasoning trace — plan → route → generate → verify → gate</h4><div class="trace">${trace}</div></div>
      <div class="sec"><h4>Gate &amp; model tiering${cell.attempts.length>1?' · escalated ×'+cell.attempts.length:''}</h4>${attempts}</div>
      ${checks?`<div class="sec"><h4>Grounding — cited figures vs official XBRL</h4>
        <table><thead><tr><th>Figure</th><th>Concept</th><th class="num">Agent</th><th class="num">XBRL</th><th>Match</th></tr></thead><tbody>${checks}</tbody></table></div>`:''}
      ${idens?`<div class="sec"><h4>Accounting identities the figures touch</h4>
        <table><thead><tr><th>Identity</th><th>Result</th></tr></thead><tbody>${idens}</tbody></table></div>`:''}
    </div>`;
  document.getElementById('scrim').classList.add('show');
  d.classList.add('show');
}

/* ---------- Eval dashboard ---------- */
function vEval(){
  const el=$('<div></div>');const m=(S.grid||{}).metrics||{};
  el.appendChild($(`<div class="phead"><h1>Evaluation</h1>
    <p>The eval engine scored against the filings' <b>own XBRL</b> — machine-checked ground truth, not an LLM judge. Answerability is defined by ground truth, which is what makes abstention measurable. Each numeric question maps to a canonical accounting concept the engine can verify or derive.</p></div>`));
  if(!m||m.total_cells==null){el.appendChild($(`<div class="note">No metrics yet — run the grid first.</div>`));return el;}
  const kc=(k,v,d,cls)=>`<div class="kc ${cls||''}"><div class="k">${k}</div><div class="v">${v}</div><div class="d">${d}</div></div>`;
  el.appendChild($(`<div class="kpis">
    ${kc('Tie-out accuracy',pct(m.tie_out_accuracy),`${m.tie_out_correct}/${m.answerable} answerable cells match XBRL`,m.tie_out_accuracy>=1?'good':'')}
    ${kc('Hallucination rate',pct(m.hallucination_rate),`${m.hallucinations} unsupported/incorrect figures`,m.hallucination_rate===0?'good':'flag')}
    ${kc('Grounding rate',pct(m.grounding_rate),`${m.grounded_ok}/${m.grounded_checkable} cited figures trace to XBRL`,m.grounding_rate>=1?'good':'')}
    ${kc('Escalation rate',pct(m.gate?m.gate.escalation_rate:0),`${m.gate?m.gate.escalated:0} cell(s) re-run on a stronger tier`,'')}
  </div>`));
  const g=m.gate||{};const bs=g.by_status||{};
  el.appendChild($(`<div class="panel"><div class="ph"><h3>Gate outcomes &amp; cost</h3><span class="sub">cheap-first tiering with a deterministic gate</span></div>
    <div class="pb"><div class="kv" style="gap:10px">
      <div class="item"><div class="k">verified</div><div class="v" style="color:var(--ok)">${bs.verified||0}</div></div>
      <div class="item"><div class="k">low-confidence</div><div class="v" style="color:var(--warn)">${bs.low_confidence||0}</div></div>
      <div class="item"><div class="k">abstained</div><div class="v" style="color:var(--slate)">${bs.abstained||0}</div></div>
      <div class="item"><div class="k">on cheap tier</div><div class="v">${g.verified_first_tier||0}/${m.total_cells}</div></div>
      <div class="item"><div class="k">unanswerable</div><div class="v">${m.unanswerable}</div></div>
      <div class="item"><div class="k">abstention recall</div><div class="v">${m.abstention_recall==null?'n/a':pct(m.abstention_recall)}</div></div>
      <div class="item"><div class="k">total cost</div><div class="v">${usd(m.cost_usd)}</div></div>
    </div>
    <div class="callout" style="margin-top:14px"><b>Why it's a gate, not a report:</b> a cell is accepted only when its answer ties out to XBRL <i>and</i> its cited figures reconcile against the accounting identities. Failures are re-run on a stronger model (cost-aware), and anything that never passes is held back as low-confidence — so a confident wrong number never reaches the grid.</div></div></div>`));
  el.appendChild(benchPanel());
  return el;
}
function benchPanel(){
  const b=S.bench;if(!b||!b.results||!Object.keys(b.results).length)
    return $(`<div class="panel"><div class="ph"><h3>Model comparison</h3></div><div class="pb"><div class="muted" style="font-size:12.5px">No model leaderboard — run <code>python scripts/run_bench.py</code>.</div></div></div>`);
  let rows='';Object.values(b.results).forEach(r=>{rows+=`<tr class="hover"><td><b>${r.label}</b></td>
    <td class="num">${pct(r.rubric_score)}</td><td class="num">${pct(r.final_accuracy)}</td>
    <td class="num">${pct(r.trusted_rate)}</td><td class="num">${pct(r.judge_accuracy)}</td>
    <td class="num" style="color:${r.money_metric?'var(--bad)':'var(--ok)'}">${r.money_metric}</td></tr>`;});
  return $(`<div class="panel flush"><div class="ph"><h3>Model comparison — hybrid eval</h3><span class="sub">${b.question_count} questions · deterministic + rubric + LLM judge</span></div>
    <table><thead><tr><th>Model</th><th class="num">Rubric</th><th class="num">Final answer</th><th class="num">Trusted</th><th class="num">Judge OK</th><th class="num">Judge-passed but wrong</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="legend"><span>Rubric grades the audit trail (retrieval/definition/calculation); Trusted = passed the deterministic gate.</span>
    <span><b style="color:var(--bad)">Judge-passed but wrong</b> = a naive LLM judge accepted these; the deterministic layer caught them (the money metric).</span></div></div>`);
}

/* ---------- Rulebook ---------- */
function vRulebook(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Rulebook</h1><p>${S.registry.length} universal accounting identities, hand-authored once and bound per filing. The gate uses these to reconcile an answer's cited figures; tolerance is rounding-aware and source-aware.</p></div>`));
  let rows='';S.registry.forEach(r=>{rows+=`<tr class="hover"><td class="mono faint">${r.id}</td><td>${r.description}</td>
    <td class="mono muted" style="font-size:11px">${r.formula}</td><td><span class="chip ${r.severity==='soft'?'slate':'acc'}">${r.severity}</span></td></tr>`;});
  el.appendChild($(`<div class="panel flush"><table><thead><tr><th>ID</th><th>Identity</th><th>Formula</th><th>Type</th></tr></thead><tbody>${rows}</tbody></table></div>`));
  return el;
}

/* ---------- Architecture ---------- */
function vArch(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Architecture</h1><p>The spine is the request path; the load-bearing idea is that <b>eval is a gate wired into the loop</b> — answers that fail grounding are re-run, not just flagged — and that <b>XBRL is free, machine-readable ground truth</b>, which is what makes a credible eval engine possible.</p></div>`));
  const L=(z,t,d,gate)=>`<div class="layer ${gate?'gate':''}"><div class="lz">${z}</div><div class="lt">${t}</div><div class="ld">${d}</div></div>`;
  el.appendChild($(`<div class="panel"><div class="ph"><h3>Request path</h3><span class="sub">a cell = one (document × question) agent run</span></div><div class="pb"><div class="arch">
    ${L('ingest','EDGAR + XBRL','pull the 10-K; parse XBRL facts (concept, value, period, dims) → the ground-truth store')}
    <div class="down">↓</div>
    ${L('orchestrate','Plan · Route','decompose the question; route numeric → structured XBRL retrieval')}
    <div class="down">↓</div>
    ${L('generate','Column agent','tiered tool-use agent retrieves grounded figures and emits a derivation')}
    <div class="down">↓</div>
    ${L('gate','Eval gate','tie-out to XBRL + verify_cell (identities, grounding, self-consistency) — accept, or escalate &amp; re-run',true)}
    <div class="down" style="color:var(--accent)">↑ re-run on fail (stronger tier) · ✓ accept on pass · ! hold as low-confidence</div>
    ${L('serve','Grid + metrics','stream verified cells to the grid; score the run against XBRL ground truth')}
  </div></div></div>`));
  const rm=(what,built,detail)=>`<tr class="rm"><td>${what}</td><td>${built?'<span class="chip ok">built</span>':'<span class="chip slate">roadmap</span>'}</td><td class="muted" style="font-size:12px">${detail}</td></tr>`;
  el.appendChild($(`<div class="panel flush"><div class="ph"><h3>What's built vs. roadmap</h3><span class="sub">honest scope</span></div>
    <table><thead><tr><th>Capability</th><th>Status</th><th>Notes</th></tr></thead><tbody>
    ${rm('XBRL ground-truth store',1,'arelle parse → fact store; the answer key for tie-out and abstention')}
    ${rm('Eval gate (tie-out + verify)',1,'deterministic, in the hot path; re-run-on-fail with model tiering + cost')}
    ${rm('Query grid + fan-out',1,'documents × questions; bounded in-process concurrency with backpressure')}
    ${rm('XBRL-grounded metrics',1,'tie-out accuracy, hallucination, grounding, abstention calibration')}
    ${rm('Constraint engine + attribution',1,'16 identities, propagation, 3-way violation attribution')}
    ${rm('Distributed fan-out (Celery/Redis)',0,'currently in-process ThreadPool; same interface, swap the executor')}
    ${rm('Hybrid prose retrieval + reranker',0,'currently structured XBRL retrieval; BM25 + embeddings + cross-encoder + span citations next')}
    ${rm('Knowledge graph (Neo4j)',0,'for multi-hop / cross-filing / cross-time questions')}
    ${rm('Multimodal table/chart extraction',0,'numbers from rendered tables and charts')}
    </tbody></table></div>`));
  return el;
}

function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
document.getElementById('scrim').onclick=closeInspect;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeInspect();});
boot();
</script>
</body>
</html>
