<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hebbify — public + private financial intelligence, reconciled & tied out</title>
<style>
  :root{
    --bg:#f4f1f6; --panel:rgba(255,255,255,.66); --panel2:rgba(255,255,255,.45);
    --solid:#ffffff;
    --line:rgba(120,110,140,.18); --line2:rgba(120,110,140,.12);
    --glass-border:rgba(255,255,255,.65);
    --ink:#1f1d2b; --ink2:#3d3a4d; --muted:#6b6878; --faint:#9b97a8;
    --accent:#6c5ce7; --accent2:#a86be0; --accent-soft:#efeaff;
    --ok:#1f9d6b; --ok-soft:#e3f6ee; --warn:#d98324; --warn-soft:#fbf0df;
    --bad:#e0566b; --bad-soft:#fce8ec; --slate:#5a6072; --slate-soft:#eceef4;
    --teal:#0ea5a0; --teal-soft:#e0f5f3; --purple:#8b5cf6; --purple-soft:#f0eafd;
    --amber:#d98324; --amber-soft:#fbf0df; --blue:#4f7fff; --blue-soft:#e8efff;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,Menlo,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --blur:saturate(150%) blur(20px);
    --shadow:0 10px 34px rgba(46,40,80,.10),inset 0 1px 0 rgba(255,255,255,.5);
    --shadow-sm:0 4px 16px rgba(46,40,80,.07),inset 0 1px 0 rgba(255,255,255,.45);
    --shadow-lg:0 24px 60px rgba(46,40,80,.16);
    --r:20px; --r-sm:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.52;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1100px 760px at 6% -4%, #ffe3d2 0%, transparent 52%),
      radial-gradient(1000px 820px at 102% 6%, #ffdcea 0%, transparent 50%),
      radial-gradient(1200px 900px at 52% 108%, #e4dbff 0%, transparent 55%),
      radial-gradient(820px 680px at -4% 104%, #d6f3ea 0%, transparent 52%),
      linear-gradient(180deg,#f6f2f8,#f1eef6);
    background-attachment:fixed;background-repeat:no-repeat}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .ulabel{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:700}
  ::-webkit-scrollbar{width:10px;height:10px} ::-webkit-scrollbar-thumb{background:rgba(120,110,140,.25);border-radius:8px;border:2px solid transparent;background-clip:padding-box}

  /* shell — floating glass panels on the mesh */
  .app{display:grid;grid-template-columns:236px 1fr;gap:16px;padding:16px;min-height:100vh}
  .side{background:rgba(255,255,255,.5);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:24px;padding:18px 14px;position:sticky;top:16px;height:calc(100vh - 32px);display:flex;flex-direction:column;gap:2px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:18px;letter-spacing:-.4px;padding:4px 8px 18px}
  .orb{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#ffd6b0,#ff8fb1 42%,#a76bf0 78%,#6c5ce7);box-shadow:0 4px 14px rgba(167,107,240,.45),inset 0 2px 5px rgba(255,255,255,.6);flex-shrink:0}
  .nav-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--faint);font-weight:700;padding:14px 12px 6px}
  .nav{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:13px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:550;transition:.14s}
  .nav:hover{background:rgba(255,255,255,.55);color:var(--ink)}
  .nav.active{background:var(--solid);color:var(--ink);font-weight:650;box-shadow:0 4px 14px rgba(46,40,80,.1)}
  .nav.active .ic{color:var(--accent)}
  .nav .ic{width:18px;height:18px;display:grid;place-items:center;color:var(--faint);flex-shrink:0}
  .nav .ic svg{width:18px;height:18px}
  .side .sp{flex:1}
  .side .ghost{font-size:11px;color:var(--faint);padding:12px;border-radius:14px;background:rgba(255,255,255,.4);margin-top:8px;line-height:1.45}

  .main{min-width:0;display:flex;flex-direction:column;gap:16px}
  /* top bar */
  .ctx{display:flex;align-items:center;gap:14px;position:sticky;top:16px;z-index:25}
  .co-pill{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.6);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:999px;padding:7px 14px 7px 9px;font-weight:650;font-size:13px;cursor:pointer;box-shadow:var(--shadow-sm);color:var(--ink)}
  .co-pill .mini-orb{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#ffd6b0,#ff8fb1 50%,#a76bf0);flex-shrink:0}
  .co-pill .tk{font-family:var(--mono);color:var(--accent);font-weight:700}
  .src-dots{display:flex;gap:5px;align-items:center}
  .sdot{width:9px;height:9px;border-radius:50%;background:rgba(120,110,140,.28);box-shadow:inset 0 0 0 1px rgba(255,255,255,.4)}
  .sdot.on{background:var(--ok)}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .search-pill{position:relative;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.62);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:999px;padding:0 14px;height:42px;width:260px;box-shadow:var(--shadow-sm)}
  .search-pill svg{width:16px;height:16px;color:var(--faint);flex-shrink:0}
  .search-pill input{border:none;background:none;outline:none;font-size:13px;font-family:var(--sans);width:100%;color:var(--ink)}
  .icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--glass-border);background:rgba(255,255,255,.62);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);display:grid;place-items:center;cursor:pointer;color:var(--ink2);box-shadow:var(--shadow-sm)}
  .icon-btn:hover{background:var(--solid)} .icon-btn svg{width:18px;height:18px}
  .icon-btn.avatar{background:radial-gradient(circle at 32% 28%,#ffd6b0,#ff8fb1 55%,#a76bf0);color:#fff;border:none}
  .content{width:100%;max-width:1280px;padding-bottom:24px}

  .phead{margin-bottom:18px;padding-left:16px;border-left:3px solid var(--accent)}
  .phead h1{margin:0 0 4px;font-size:29px;letter-spacing:-.8px;font-weight:750;line-height:1.1}
  .phead p{margin:0;color:var(--muted);font-size:14px;max-width:820px}

  .panel{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:16px;overflow:hidden}
  .panel .ph{padding:14px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:9px}
  .panel .ph h3{margin:0;font-size:14px;font-weight:680}
  .panel .ph .sub{color:var(--faint);font-size:11.5px;margin-left:auto;font-weight:400}
  .panel .pb{padding:16px 18px}
  .panel.flush .pb{padding:0}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 16px;border-bottom:1px solid var(--line2)}
  th{color:var(--faint);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tr.click,tr.runrow{cursor:pointer} tr.click:hover,tr.runrow:hover{background:rgba(255,255,255,.5)}
  tr.sel{background:var(--accent-soft)}

  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:10.5px;font-weight:600;white-space:nowrap}
  .chip.ok{background:var(--ok-soft);color:var(--ok)}
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.bad{background:var(--bad-soft);color:var(--bad)}
  .chip.slate{background:var(--slate-soft);color:var(--slate)}
  .chip.acc{background:var(--accent-soft);color:var(--accent)}
  .chip.ghost{background:rgba(255,255,255,.5);color:var(--muted);border:1px solid var(--line2)}
  .chip.teal{background:var(--teal-soft);color:var(--teal)}
  .chip.purple{background:var(--purple-soft);color:var(--purple)}
  .chip.amber{background:var(--amber-soft);color:var(--amber)}
  .chip.blue{background:var(--blue-soft);color:var(--blue)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kc,.kpi{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r-sm);padding:16px 17px;box-shadow:var(--shadow-sm)}
  .kc .k,.kpi .kl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:600;margin-bottom:9px}
  .kc .v,.kpi .kv{font-family:var(--mono);font-size:27px;font-weight:680;letter-spacing:-1.2px;line-height:1;color:var(--ink)}
  .kc .d{font-size:11px;color:var(--muted);margin-top:7px}
  .kc.danger .v{color:var(--bad)} .kc.good .v{color:var(--ok)} .kc.warn .v{color:var(--warn)}
  .kpi{display:block}

  .two{display:grid;grid-template-columns:1.25fr 1fr;gap:16px}
  @media(max-width:980px){.two{grid-template-columns:1fr}}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);transition:.16s}
  .card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
  .card.locked{opacity:.72}
  .card .ct{font-weight:680;font-size:14.5px;display:flex;align-items:center;gap:8px}
  .card .cv{font-size:12px;color:var(--muted);margin-top:2px}
  .card .cd{font-size:12.5px;color:var(--ink2);margin-top:10px;line-height:1.5}
  .card .cmeta{font-size:11px;color:var(--faint);margin-top:10px}

  /* dashboard + gradient hero tiles (Sense-style) */
  .home-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;align-items:start}
  @media(max-width:1040px){.home-grid{grid-template-columns:1fr}}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
  .tile{position:relative;border-radius:var(--r);padding:18px;min-height:152px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--glass-border);transition:.18s}
  .tile:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .tile .tlabel{font-weight:720;font-size:17px;color:#2a2436;letter-spacing:-.3px;z-index:1}
  .tile .tdesc{font-size:11.5px;color:rgba(42,36,54,.72);margin-top:3px;z-index:1;line-height:1.45}
  .tile .tarrow{align-self:flex-end;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.7);display:grid;place-items:center;color:#2a2436;z-index:1;box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .tile .ttop{display:flex;justify-content:space-between;align-items:flex-start;z-index:1}
  .tile .tchip{font-size:10px;font-weight:700;background:rgba(255,255,255,.55);color:#3a2f48;padding:3px 9px;border-radius:999px;z-index:1}
  .g1{background:linear-gradient(140deg,#ffdcc6,#ff9fb6 52%,#c9a6ff)}
  .g2{background:linear-gradient(140deg,#c8f0d8,#9fe0c0 50%,#7fd0e6)}
  .g3{background:linear-gradient(140deg,#dcd4ff,#b9a6ff 52%,#f0a6d6)}
  .g4{background:linear-gradient(140deg,#ffe6b0,#ffc187 52%,#ff9fb0)}
  .g5{background:linear-gradient(140deg,#cfe0ff,#a9c4ff 55%,#d0b0ff)}
  .tile-img{position:absolute;inset:0;opacity:.85;background-size:cover}

  .greet{background:linear-gradient(135deg,rgba(255,255,255,.78),rgba(255,255,255,.5));backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:26px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;min-height:152px}
  .greet h2{margin:0;font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1.25;color:var(--ink2)}
  .greet h2 b{font-weight:780;color:var(--ink)}
  .greet .gorb{position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffd6b0,#ff8fb1 45%,#a76bf0 80%);opacity:.5;filter:blur(6px)}

  .ins{display:flex;gap:10px;padding:12px 14px;border:1px solid var(--line2);border-radius:var(--r-sm);margin-bottom:8px;background:rgba(255,255,255,.4)}
  .ins .sv{width:3px;border-radius:3px;flex-shrink:0}
  .ins.high .sv{background:var(--bad)} .ins.medium .sv{background:var(--warn)} .ins.low .sv{background:var(--slate)}
  .ins .hl{font-weight:600;font-size:12.5px} .ins .dt{font-size:11.5px;color:var(--muted);margin-top:3px}
  .ins .ev{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:4px}

  .recon td .v{font-family:var(--mono)}
  .miniwc{display:flex;gap:8px;flex-wrap:wrap}
  .wccell{flex:1;min-width:90px;background:rgba(255,255,255,.4);border:1px solid var(--line2);border-radius:12px;padding:10px 12px}
  .wccell .k{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
  .wccell .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:2px}

  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:10px 18px;border-radius:13px;font-size:12.5px;font-weight:650;cursor:pointer;box-shadow:0 6px 18px rgba(108,92,231,.32);transition:.14s}
  .btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn.ghost{background:rgba(255,255,255,.6);color:var(--ink);border:1px solid var(--glass-border);box-shadow:var(--shadow-sm)}
  .btn.sm{padding:6px 13px;font-size:11.5px;border-radius:10px}
  .search{display:flex;gap:8px;margin-bottom:16px;position:relative}
  .search input{flex:0 0 420px;max-width:100%;border:1px solid var(--glass-border);background:rgba(255,255,255,.6);border-radius:14px;padding:12px 16px;font-size:13.5px;font-family:var(--sans);box-shadow:var(--shadow-sm)}
  .search input:focus{outline:none;border-color:var(--accent);background:var(--solid)}

  /* inspector */
  .scrim{position:fixed;inset:0;background:rgba(40,34,60,.32);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:.15s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:94vw;background:rgba(255,255,255,.82);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-left:1px solid var(--glass-border);box-shadow:-12px 0 50px rgba(40,34,60,.18);z-index:50;transform:translateX(100%);transition:transform .2s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer .dh{padding:16px 20px;border-bottom:1px solid var(--line)}
  .drawer .db{padding:18px 20px;overflow-y:auto;flex:1}
  .drawer .x{position:absolute;top:14px;right:18px;cursor:pointer;color:var(--faint);font-size:20px;border:none;background:none}
  .sec{margin-bottom:20px} .sec h4{margin:0 0 9px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700}
  .trace{position:relative;margin-left:5px;padding-left:17px;border-left:2px solid var(--line)}
  .tev{position:relative;margin-bottom:10px;font-size:12px}
  .tev:before{content:'';position:absolute;left:-23px;top:3px;width:8px;height:8px;border-radius:50%;background:var(--ok);border:2px solid var(--solid)}
  .tev .s{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kv .i{background:rgba(255,255,255,.45);border:1px solid var(--line2);border-radius:10px;padding:7px 11px;min-width:80px}
  .kv .i .k{font-size:9.5px;color:var(--faint);text-transform:uppercase} .kv .i .v{font-family:var(--mono);font-size:13px;font-weight:600;margin-top:1px}
  code{font-family:var(--mono);background:var(--slate-soft);padding:1px 5px;border-radius:5px;font-size:11px}
  .note{background:rgba(255,255,255,.45);border:1px solid var(--line2);border-radius:var(--r-sm);padding:12px 15px;color:var(--muted);font-size:12px}
  .callout{background:var(--accent-soft);border:1px solid rgba(108,92,231,.2);border-radius:var(--r-sm);padding:12px 15px;font-size:12px;color:#4a3f8f}
  .callout b{color:var(--accent)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
  .loading{color:var(--muted);padding:50px;text-align:center}
  .qstatus{font-size:12.5px;padding:10px 15px;border-radius:13px;margin-bottom:14px;background:rgba(255,255,255,.45);border:1px solid var(--line2);color:var(--muted);display:flex;align-items:center;gap:8px}
  .qstatus.run{background:var(--accent-soft);border-color:rgba(108,92,231,.25);color:var(--accent)}
  .qstatus.ok{background:var(--ok-soft);border-color:#bfe6cb;color:var(--ok);font-weight:600}
  .qstatus.warn{background:var(--warn-soft);border-color:#f0dcbf;color:var(--warn)}
  .tev2{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0}
  .tickok{color:var(--ok);font-weight:700} .tickdim{color:var(--faint)}
  .acbox{position:absolute;top:48px;left:0;width:100%;min-width:320px;background:rgba(255,255,255,.92);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r-sm);box-shadow:var(--shadow-lg);z-index:30;max-height:340px;overflow:auto}
  .acbox:empty{display:none}
  .acitem{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line2);display:flex;gap:9px;align-items:baseline}
  .acitem:last-child{border-bottom:none} .acitem:hover{background:var(--accent-soft)}
  .memo{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:30px 34px;max-width:780px;box-shadow:var(--shadow-sm)}
  .memo h2{font-size:19px;margin:0 0 2px} .memo .by{color:var(--faint);font-size:11.5px;margin-bottom:16px}
  .memo h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin:18px 0 8px}
  .memo li{margin:5px 0;font-size:13px} .memo .cite{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  /* ask panel (chat) */
  .chatwrap{display:flex;flex-direction:column;gap:10px}
  .bubble{border-radius:16px;padding:12px 15px;font-size:12.5px;line-height:1.55;max-width:88%}
  .bubble.you{background:rgba(255,255,255,.55);align-self:flex-end;border:1px solid var(--line2)}
  .bubble.ai{background:var(--accent-soft);align-self:flex-start;color:#3f3676}
  .bubble .who{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.6;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .askbar{display:flex;align-items:center;gap:8px;background:var(--solid);border:1px solid var(--glass-border);border-radius:999px;padding:6px 6px 6px 16px;box-shadow:var(--shadow-sm)}
  .askbar input{border:none;outline:none;background:none;flex:1;font-size:13px;font-family:var(--sans);color:var(--ink)}
  .askbar .go{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:grid;place-items:center;cursor:pointer;flex-shrink:0}
  .askbar .go svg{width:16px;height:16px}
  /* per-tab page ask bar */
  .pageask{margin-top:20px;padding-top:18px;border-top:1px dashed var(--line)}
  .pageask-lbl{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:9px}
  .pageask-lbl svg{width:15px;height:15px}
  .pageask .askbar{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
</style>
</head>
<body>
<div class="app">

    <div class="sp"></div>

    <div class="content" id="view"></div>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>

<script>
const NAV=[
  ['GENERAL',[['home','Dashboard','grid'],['qoe','Quality of Earnings','chart'],['analyses','Analyses','layers'],['ask','Ask anything','spark']]],
  ['DATA',[['companies','Companies','building'],['sources','Connectors','plug']]],
  ['OUTPUT',[['runs','Activity','activity'],['artifacts','Investor memo','doc'],['evals','Trust','shield']]],

const ICONS={
  grid:'<rect x="3" y="3" width="7.5" height="7.5" rx="2"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="2"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="2"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2"/>',
  chart:'<path d="M3 20h18"/><path d="M6 20v-6M11 20V5M16 20v-9"/>',
  layers:'<path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/>',
  spark:'<path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/>',
  building:'<rect x="4" y="3" width="11" height="18" rx="1.5"/><path d="M15 8h4a1 1 0 011 1v12H4"/><path d="M8 7h0M11 7h0M8 11h0M11 11h0M8 15h0M11 15h0"/>',
  plug:'<path d="M9 7V3M15 7V3"/><path d="M7 7h10v3a5 5 0 01-10 0V7z"/><path d="M12 15v6"/>',
  activity:'<path d="M3 12h4l3 8 4-16 3 8h4"/>',
  doc:'<path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/><path d="M10 13h6M10 17h6"/>',
  shield:'<path d="M12 3l8 3v5c0 5-3.4 8-8 10-4.6-2-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>',
  bell:'<path d="M6 9a6 6 0 0112 0c0 4 1.5 5 2 6H4c.5-1 2-2 2-6z"/><path d="M10 20a2 2 0 004 0"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 4-6.5 8-6.5s8 2.1 8 6.5"/>',
  send:'<path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>',
  arrow:'<path d="M7 17L17 7M9 7h8v8"/>',
};
function icon(n){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||'')+'</svg>';}
// same-origin by default (works on localhost + a whole-app deploy); set to the deployed
// API URL only if the UI is hosted on a different origin than the API.
const API='';
const S={tab:'home',company:null,companies:[],qoe:null,sources:[],conn:new Set(),analyses:null,evals:null,bench:null,inspect:null,busy:false};
function have(id){return id==='edgar'||S.conn.has(id);}
const $=h=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};
function pct(v){return v==null?'—':(v*100).toFixed(Math.abs(v*100)>=10?0:1)+'%';}
function money(v){if(v==null)return '—';const a=Math.abs(v),s=v<0?'−':'';
  if(a>=1e9)return s+'$'+(a/1e9).toFixed(2)+'B';if(a>=1e6)return s+'$'+(a/1e6).toFixed(0)+'M';
  if(a>=1e3)return s+'$'+(a/1e3).toFixed(0)+'K';return s+'$'+a.toFixed(0);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function boot(){
  const j=async u=>{try{return await(await fetch(u)).json();}catch(e){return null;}};
  S.companies=await j('/api/qoe/companies')||[];
  if(S.companies.length){S.company=S.companies[0].ticker; await loadCompany();}
  renderNav(); render();
}
async function loadCompany(){
  const j=async u=>{try{return await(await fetch(u)).json();}catch(e){return null;}};
  [S.qoe,S.sources]=await Promise.all([j('/api/qoe/'+S.company),j('/api/sources/'+S.company)]);
  S.conn=new Set((S.sources||[]).filter(s=>s.status==='connected'&&s.id!=='edgar').map(s=>s.id));
  S.analyses=null;
}
function renderNav(){
  const n=document.getElementById('nav');n.innerHTML='';
  NAV.forEach(([group,items])=>{
    const lbl=document.createElement('div');lbl.className='nav-label';lbl.textContent=group;n.appendChild(lbl);
    items.forEach(([id,label,ic])=>{
      const e=$(`<div class="nav ${id===S.tab?'active':''}"><span class="ic">${icon(ic)}</span>${esc(label)}</div>`);
      e.onclick=()=>{S.tab=id;closeInspect();renderNav();render();};n.appendChild(e);});
  });
  renderCtx();
}
function renderCtx(){
  const c=document.getElementById('ctx');const q=S.qoe;
  const tk=q&&q.ticker?q.ticker:'—', name=q&&q.issuer?q.issuer:'No company';
  const dots=['edgar','erp','crm','hris','investor'].map(id=>`<span class="sdot ${have(id)?'on':''}" title="${id}"></span>`).join('');
  c.innerHTML=`<button class="co-pill" id="co-pill"><span class="mini-orb"></span><span class="tk">${esc(tk)}</span><span style="color:var(--muted);font-weight:550;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span></button>
    <div class="src-dots" title="connected sources (EDGAR · ERP · CRM · HRIS · investor)">${dots}</div>
    <div class="tb-right">
      <div class="search-pill">${icon('search')}<input id="top-q" autocomplete="off" placeholder="Search any company…"/><div class="acbox" id="top-ac"></div></div>
      <button class="icon-btn" id="tb-bell" title="Activity log">${icon('bell')}</button>
      <button class="icon-btn avatar" title="Account">${icon('user')}</button>
    </div>`;
  const pill=document.getElementById('co-pill');if(pill)pill.onclick=()=>{S.tab='home';renderNav();render();};
  const bell=document.getElementById('tb-bell');if(bell)bell.onclick=()=>{S.tab='runs';renderNav();render();};
  wireTopSearch();
}
function wireTopSearch(){
  const inp=document.getElementById('top-q'),ac=document.getElementById('top-ac');if(!inp)return;
  ac.onmousedown=e=>e.preventDefault();let timer;
  inp.oninput=()=>{clearTimeout(timer);const v=inp.value.trim();if(v.length<2){ac.innerHTML='';return;}
    timer=setTimeout(async()=>{let res=[];try{res=await(await fetch(`${API}/api/search?q=`+encodeURIComponent(v))).json();}catch(e){}
      ac.innerHTML=(res||[]).slice(0,8).map(c=>`<div class="acitem" data-t="${c.ticker}" data-n="${esc(c.name)}"><span class="mono" style="color:var(--accent);font-weight:700;min-width:52px">${c.ticker}</span><span>${esc(c.name)}</span></div>`).join('')||'<div class="acitem muted">no match</div>';
      ac.querySelectorAll('.acitem[data-t]').forEach(it=>it.onclick=()=>{inp.value='';ac.innerHTML='';selectCompanyByTicker(it.getAttribute('data-t'),it.getAttribute('data-n'));});
    },180);};
  inp.onkeydown=e=>{if(e.key==='Enter'){const f=ac.querySelector('.acitem[data-t]');if(f)f.click();}};
  inp.onblur=()=>setTimeout(()=>{ac.innerHTML='';},200);
}
const TABTHEME={
  home:['#6c5ce7','#a86be0','#efeaff'], qoe:['#4f7fff','#86a6ff','#e9efff'],
  analyses:['#10a79f','#5fd0c8','#e1f5f3'], ask:['#b15cd6','#df8ad6','#f7ebfb'],
  companies:['#e08a2c','#f0b26a','#fbefdc'], sources:['#8b5cf6','#b794f6','#f0eafd'],
  runs:['#4f7fff','#86a6ff','#e9efff'], artifacts:['#e0566b','#f0899a','#fce9ec'],
  evals:['#1f9d6b','#5fc99a','#e4f6ee']};
function render(){const v=document.getElementById('view');
  v.innerHTML='';v.appendChild(({home:vHome,workflows:vWorkflows,qoe:vQoE,ask:vAsk,analyses:vAnalyses,companies:vCompanies,sources:vSources,
    runs:vRuns,artifacts:vArtifacts,evals:vEvals}[S.tab]||vHome)());
  const th=TABTHEME[S.tab]||TABTHEME.home;
  v.style.setProperty('--accent',th[0]);v.style.setProperty('--accent2',th[1]);v.style.setProperty('--accent-soft',th[2]);
  if(!['home','ask'].includes(S.tab))v.appendChild(pageAskBar());
}
function pageAskBar(){
  const w=$(`<div class="pageask"><div class="pageask-lbl">${icon('spark')} Ask about any number on this page</div>
    <div class="askbar"><input id="page-ask" placeholder="e.g. why is this number what it is? what changed year over year?"/><button class="go" id="page-ask-go">${icon('send')}</button></div></div>`);
  const inp=w.querySelector('#page-ask'),go=w.querySelector('#page-ask-go');
  const run=()=>{const q=(inp.value||'').trim();if(!q)return;S.pendingAsk=q;S.tab='ask';renderNav();render();};
  go.onclick=run;inp.onkeydown=e=>{if(e.key==='Enter')run();};
  return w;
}

/* ---------- Dashboard (landing) ---------- */
function vHome(){
  const el=$('<div></div>');const q=S.qoe;
  let greet='Hello';try{const h=new Date().getHours();greet=h<12?'Good morning':h<18?'Good afternoon':'Good evening';}catch(e){}
  el.appendChild($(`<div class="phead"><h1>Dashboard</h1><p>Public filings + private ERP/CRM, reconciled and tied out. Pick a focus or just ask. <b>Calibrated demo data.</b></p></div>`));
  const grid=$(`<div class="home-grid"></div>`);
  const left=$('<div></div>');
  const tiles=[
    ['qoe','g1','Workflow','Quality of Earnings','Reported vs underlying growth, concentration, one-time items.'],
    ['analyses','g2','10 analyses','Analyses','Margins, cash flow, ROI by segment, headcount.'],
    ['ask','g3','AI','Ask anything','A grounded analyst answers any question — with citations.'],
    ['artifacts','g4','Export','Investor memo','A finished, source-cited diligence memo — as PDF.'],
    ['companies','g5','Data','Companies','Search &amp; load any SEC filer.'],
    ['sources','g1','Connect','Connectors','Wire ERP/CRM/HRIS to unlock more analyses.']];
  const tg=$('<div class="tiles" style="margin-bottom:18px"></div>');
  tiles.forEach(([tab,g,chip,label,desc])=>{
    const t=$(`<div class="tile ${g}"><div class="ttop"><span class="tchip">${esc(chip)}</span></div><div><div class="tlabel">${esc(label)}</div><div class="tdesc">${desc}</div></div><div class="tarrow">${icon('arrow')}</div></div>`);
    t.onclick=()=>{S.tab=tab;renderNav();render();};tg.appendChild(t);});
  left.appendChild(tg);
  if(q&&q.ticker){
    left.appendChild($(`<div class="ulabel" style="margin:4px 2px 11px">${esc(q.issuer)} · FY${q.fiscal_year} — live snapshot</div>`));
    const ks=$('<div class="kpis"></div>');
    [['Reported growth',pct(q.reported_growth)],['Underlying',pct(q.underlying_growth)],['Top-5 conc.',pct(q.top5_concentration)],['Net retention',q.net_retention!=null?pct(q.net_retention):'—']]
      .forEach(([l,v])=>ks.appendChild($(`<div class="kc"><div class="k">${esc(l)}</div><div class="v">${v}</div></div>`)));
    left.appendChild(ks);
    left.appendChild($(`<div class="card" id="home-tied" style="cursor:pointer;display:flex;align-items:center;gap:12px">
      <span class="chip ${q.tied_out?'ok':'warn'}">${q.tied_out?'✓ tied out':'variance'}</span>
      <span style="font-size:12.5px;color:var(--muted)">${(q.reconciliation||[]).filter(r=>r.fiscal_year===q.fiscal_year).length} public marginals reconciled to the private ledger — open the QoE trace.</span></div>`));
  }
  grid.appendChild(left);
  const right=$('<div style="display:flex;flex-direction:column;gap:16px"></div>');
  right.appendChild($(`<div class="greet"><div class="gorb"></div><h2>${greet},<br><b>what do you want to diligence?</b></h2></div>`));
  right.appendChild($(`<div class="panel" style="margin:0"><div class="pb">
    <div class="chatwrap"><div class="bubble ai"><div class="who"><span class="mini-orb" style="width:15px;height:15px"></span>Hebbify</div>Ask me anything about ${esc(q&&q.issuer?q.issuer:'the active company')} — e.g. “how concentrated is revenue, and is growth high quality?” I’ll pull the filings + ledger and answer with citations.</div></div>
    <div class="askbar" style="margin-top:13px"><input id="home-ask" placeholder="Ask anything…"/><button class="go" id="home-ask-go">${icon('send')}</button></div>
  </div></div>`));
  grid.appendChild(right);
  el.appendChild(grid);
  setTimeout(()=>{
    const t=document.getElementById('home-tied');if(t)t.onclick=()=>{S.tab='qoe';renderNav();render();};
    const inp=document.getElementById('home-ask'),go=document.getElementById('home-ask-go');
    const run=()=>{const v=(inp.value||'').trim();if(!v)return;S.pendingAsk=v;S.tab='ask';renderNav();render();};
    if(go)go.onclick=run;if(inp)inp.onkeydown=e=>{if(e.key==='Enter')run();};
  },0);
  return el;
}
function wireHomeSearch(){
  const inp=document.getElementById('home-q'),ac=document.getElementById('home-ac');if(!inp)return;
  ac.onmousedown=e=>e.preventDefault();   // don't blur the input on item click -> the click always lands
  let timer;
  inp.oninput=()=>{clearTimeout(timer);const v=inp.value.trim();if(v.length<2){ac.innerHTML='';return;}
    timer=setTimeout(async()=>{let res=[];try{res=await(await fetch(`${API}/api/search?q=`+encodeURIComponent(v))).json();}catch(e){}
      ac.innerHTML=(res||[]).slice(0,8).map(c=>`<div class="acitem" data-t="${c.ticker}" data-n="${esc(c.name)}"><span class="mono" style="color:var(--accent);font-weight:700;min-width:54px">${c.ticker}</span><span>${esc(c.name)}</span></div>`).join('')||'<div class="acitem muted">no match — try the ticker</div>';
      ac.querySelectorAll('.acitem[data-t]').forEach(it=>it.onclick=()=>selectCompanyByTicker(it.getAttribute('data-t'),it.getAttribute('data-n')));
    },180);};
  inp.onkeydown=e=>{if(e.key==='Enter'){const f=ac.querySelector('.acitem[data-t]');if(f)f.click();}};
  inp.onblur=()=>setTimeout(()=>{ac.innerHTML='';},200);
}
async function selectCompanyByTicker(ticker,name){
  const known=(S.companies||[]).some(c=>c.ticker===ticker);
  const v=document.getElementById('view');
  // immediately replace the view with a loud loading state so it's obvious something is happening
  v.innerHTML=`<div class="phead"><h1>${known?'Loading':'Ingesting'} ${esc(name||ticker)} <span class="mono" style="color:var(--accent)">${esc(ticker)}</span>…</h1>
    <p>${known?'Reading the latest filing data.':'Pulling '+esc(ticker)+' from SEC EDGAR — the first time takes ~30s. Building the synthetic ledger and tying it out to the filing.'}</p></div>
    <div class="loading" style="font-size:14px"><span class="spin"></span> working…</div>`;
  try{
    if(!known){const r=await fetch(`${API}/api/qoe/${ticker}/run`,{method:'POST'});if(!r.ok)throw new Error(((await r.json())||{}).detail||r.statusText);
      S.companies=await(await fetch(`${API}/api/qoe/companies`)).json();}
    S.company=ticker;await loadCompany();S.tab='qoe';renderNav();render();}
  catch(e){
    v.innerHTML=`<div class="phead"><h1>Couldn't load ${esc(ticker)}</h1><p>${esc(e.message||'ingest failed')}</p></div>
      <div class="note">Some tickers can't be ingested — foreign filers (20-F like NetEase), funds/ETFs, or names without machine-readable XBRL. Try a US-listed operating company, e.g. <b>NVDA, MSFT, AMZN, CRM, COST, NFLX</b>.</div>
      <div style="margin-top:14px"><button class="btn" onclick="S.tab='home';renderNav();render();">← Back to search</button></div>`;
  }
}

/* ---------- Ask anything (live AI query agent) ---------- */
function vAsk(){
  const el=$('<div></div>');
  const issuer=(S.qoe&&S.qoe.issuer)||((S.companies.find(c=>c.ticker===S.company)||{}).issuer)||S.company||'';
  el.appendChild($(`<div class="phead"><h1>Ask anything — ${esc(issuer)}</h1>
    <p>A grounded AI analyst answers any question using ${esc(S.company)}'s SEC filings + the synthetic ERP/CRM ledger — watch it call tools, then stream a cited answer with a tie-out badge. <b>Calibrated demo data.</b></p></div>`));
  el.appendChild($(`<div class="search" style="margin-bottom:14px"><input id="askq" autocomplete="off" placeholder="Ask anything about ${esc(S.company)} — e.g. how concentrated is revenue?" style="flex:1"/><button class="btn" id="askbtn">Ask</button></div>`));
  el.appendChild($(`<div id="ask-deck"></div>`));
  el.appendChild($(`<div><div id="ask-status" class="qstatus" style="display:none"></div>
    <div class="panel" id="ask-panel" style="display:none"><div class="ph"><h3>Answer</h3><span class="sub" id="ask-cites"></span></div>
      <div class="pb"><div id="ask-trace" style="margin-bottom:10px"></div><div id="ask-answer" style="font-size:14px;line-height:1.65;white-space:pre-wrap"></div></div></div></div>`));
  setTimeout(()=>{wireAsk();loadDeck();
    if(S.pendingAsk){const inp=document.getElementById('askq');if(inp)inp.value=S.pendingAsk;askRun(S.pendingAsk);S.pendingAsk=null;}},0);
  return el;
}
function loadDeck(){
  fetch(`${API}/api/ask/deck`).then(r=>r.json()).then(deck=>{
    const d=document.getElementById('ask-deck');if(!d)return;
    d.innerHTML='<div class="ulabel" style="margin-bottom:8px">Try asking</div>'+(deck||[]).map(g=>
      `<div style="margin-bottom:9px"><div class="muted" style="font-size:11px;margin-bottom:4px">${esc(g.group)}</div><div style="display:flex;flex-wrap:wrap;gap:6px">${g.qs.map(q=>`<span class="chip acc qpick" style="cursor:pointer">${esc(q)}</span>`).join('')}</div></div>`).join('');
    d.querySelectorAll('.qpick').forEach(c=>c.onclick=()=>{const q=c.textContent;const inp=document.getElementById('askq');if(inp)inp.value=q;askRun(q);});
  }).catch(()=>{});
}
function wireAsk(){
  const inp=document.getElementById('askq'),btn=document.getElementById('askbtn');
  const go=()=>{const q=(inp.value||'').trim();if(q)askRun(q);};
  if(btn)btn.onclick=go; if(inp)inp.onkeydown=e=>{if(e.key==='Enter')go();};
}
function askRun(q){
  const panel=document.getElementById('ask-panel'),status=document.getElementById('ask-status'),
    trace=document.getElementById('ask-trace'),ans=document.getElementById('ask-answer'),cites=document.getElementById('ask-cites');
  if(!panel)return;
  panel.style.display='';status.style.display='';trace.innerHTML='';ans.textContent='';cites.innerHTML='';
  status.className='qstatus run';status.innerHTML='<span class="spin" style="margin:0"></span><span>thinking… <span id="ask-timer" class="mono">0.0s</span></span>';
  const t0=Date.now();let got=false,finished=false;
  clearInterval(S.askTimer);S.askTimer=setInterval(()=>{const t=document.getElementById('ask-timer');if(t)t.textContent=((Date.now()-t0)/1000).toFixed(1)+'s';},100);
  let es;try{es=new EventSource(`${API}/api/stream/ask?ticker=${encodeURIComponent(S.company)}&q=${encodeURIComponent(q)}`);}
  catch(e){clearInterval(S.askTimer);status.className='qstatus warn';status.innerHTML='<span>no live backend</span>';return;}
  const stop=()=>{clearInterval(S.askTimer);if(es)es.close();};
  es.addEventListener('run_started',()=>{got=true;});
  es.addEventListener('step',e=>{got=true;const s=JSON.parse(e.data);upsertAskStep(s.id,s.label,s.status);});
  es.addEventListener('citation',e=>{const c=JSON.parse(e.data);cites.insertAdjacentHTML('beforeend',`<span class="chip ghost" style="margin-left:4px">${esc(c.source)}</span>`);});
  es.addEventListener('token',e=>{ans.textContent+=JSON.parse(e.data).text;});
  es.addEventListener('tie_out',e=>{if(JSON.parse(e.data).passed)cites.insertAdjacentHTML('beforeend','<span class="chip ok" style="margin-left:4px">✓ ties out to XBRL</span>');});
  es.addEventListener('failed',e=>{finished=true;stop();status.className='qstatus warn';status.innerHTML=`<span>⚠ ${esc(JSON.parse(e.data).message)}</span>`;});
  es.addEventListener('done',e=>{finished=true;const d=JSON.parse(e.data);stop();status.className='qstatus ok';status.innerHTML=`<span class="tickok">✓</span><span>answered · <span class="mono">${(d.elapsed_ms/1000).toFixed(1)}s</span></span>`;});
  es.onerror=()=>{if(finished)return;stop();status.className='qstatus warn';status.innerHTML=got?'<span>disconnected</span>':'<span>could not reach the AI backend (needs the live server + an API key)</span>';};
}
function upsertAskStep(id,label,status){let row=document.getElementById('astep-'+id);
  if(!row){row=document.createElement('div');row.id='astep-'+id;row.className='tev2';const t=document.getElementById('ask-trace');if(t)t.appendChild(row);}
  row.innerHTML=(status==='done'?'<span class="tickok">✓</span>':'<span class="spin" style="margin:0"></span>')+`<span>${esc(label)}</span>`;}

/* ---------- Workflows library ---------- */
function vWorkflows(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Workflows</h1><p>Saved analyses that fuse public filings with private ERP/CRM. Running one compiles a set of cell-agents that retrieve, reconcile, and tie out — the work shows in the right inspector.</p></div>`));
  const wf=[
    {id:'qoe',name:'Quality of Earnings',tag:'ready',desc:'Reconcile filed segment revenue against the customer/SKU ledger — surface concentration, underlying growth, one-time revenue, margin mix, DSO drift.',kind:'acc'},
    {id:'grid',name:'Verified Query Grid',tag:'ready',desc:'Documents × questions, each cell gated against XBRL ground truth (tie-out + identity reconciliation).',kind:'teal',href:true},

/* the streaming run — open a workflow and watch it compute */
function runQoE(ticker){
  if(!ticker)return;
  qoeReset(); setQoeStatus('running');
  let got=false, finished=false; const t0=Date.now();
  clearInterval(S.qoeTimer);
  S.qoeTimer=setInterval(()=>{const t=document.getElementById('qoe-timer');if(t)t.textContent=((Date.now()-t0)/1000).toFixed(1)+'s';},100);
  let es;
  try{ es=new EventSource(`${API}/api/stream/qoe?ticker=${encodeURIComponent(ticker)}`); }
  catch(e){ clearInterval(S.qoeTimer); qoeFallback(ticker); return; }
  const stop=()=>{clearInterval(S.qoeTimer); if(es) es.close();};
  es.addEventListener('run_started',()=>{got=true;qoeReset();setQoeStatus('running');});
  es.addEventListener('step',e=>{got=true;const s=JSON.parse(e.data);upsertStep(s.id,s.label,s.status);});
  es.addEventListener('count',e=>{const c=JSON.parse(e.data);appendTrace(`${c.label}: ${c.n.toLocaleString()}`);});
  es.addEventListener('tie_out',e=>{const c=JSON.parse(e.data);addTieOut(c.check,c.passed);});
  es.addEventListener('cell',e=>{appendReconRow(JSON.parse(e.data));});
  es.addEventListener('metric',e=>{const m=JSON.parse(e.data);setKpi(m.key,m.value,m.unit,m.flag);});
  es.addEventListener('finding',e=>{const f=JSON.parse(e.data);addFinding(f.severity,f.text,f.detail,f.evidence);});
  es.addEventListener('result',e=>{onResult(JSON.parse(e.data));});
  es.addEventListener('failed',e=>{finished=true;stop();showError(JSON.parse(e.data).message);});
  es.addEventListener('done',e=>{const d=JSON.parse(e.data);finished=true;stop();setQoeStatus('done',d.checks_passed,d.elapsed_ms);});
  es.onerror=()=>{if(finished)return;stop();if(!got)qoeFallback(ticker);else setQoeStatus('warn','disconnected');};
}
/* no live backend (e.g. the static export) -> replay the cached run */
function qoeFallback(ticker){
  fetch(`${API}/api/qoe/${ticker}`).then(r=>r.json()).then(rep=>{
    if(rep&&rep.ticker){replayCached(rep);} else {setQoeStatus('warn','disconnected');}
  }).catch(()=>setQoeStatus('warn','disconnected'));
}
function replayCached(rep){
  qoeReset();
  (rep.reconciliation||[]).filter(r=>r.fiscal_year===rep.fiscal_year).forEach(r=>{
    const label=r.marginal.includes('·')?r.marginal.split('·')[1].trim():r.marginal;
    appendReconRow({segment:label,filed:r.target,rollup:r.synthetic,variance:r.pct,ties:r.ties_out});
    addTieOut(label,r.ties_out);});
  (rep.insights||[]).forEach(i=>addFinding(i.severity,i.headline,i.detail,i.evidence));
  upsertStep('cache','run loaded from cache','done'); onResult(rep);
  const e=document.getElementById('qoe-status');if(e){e.className='qstatus';e.innerHTML='<span class="muted">replaying cached run (no live backend)</span>';}
}

/* typeahead: resolve a NAME -> ticker via /api/search, then run live (fixes 'NVIDIA not found') */
function wireCompanySearch(sb){
  const inp=sb.querySelector('#csearch'), ac=sb.querySelector('#cac'), msg=sb.querySelector('#cmsg');
  ac.onmousedown=e=>e.preventDefault();   // don't blur the input on item click -> the click always lands

  const run=async(ticker,name)=>{
    ac.innerHTML=''; msg.innerHTML='<span class="spin" style="margin:0"></span> ingesting '+esc(name||ticker)+' from SEC EDGAR… (~30s first time)';
    try{const r=await fetch(`${API}/api/qoe/${ticker}/run`,{method:'POST'});if(!r.ok)throw new Error((await r.json()).detail||r.statusText);
      S.company=ticker; S.companies=await(await fetch(`${API}/api/qoe/companies`)).json(); await loadCompany(); S.tab='qoe'; renderNav(); render();}
    catch(e){ msg.textContent='Could not run '+ticker+': '+e.message; }
  };
  inp.oninput=()=>{clearTimeout(timer);const q=inp.value.trim();if(q.length<2){ac.innerHTML='';return;}
    timer=setTimeout(async()=>{ let res=[];
      try{res=await(await fetch(`${API}/api/search?q=`+encodeURIComponent(q))).json();}catch(e){}

        ||'<div class="acitem muted">no match — try the ticker</div>';
      ac.querySelectorAll('.acitem[data-t]').forEach(it=>it.onclick=()=>run(it.getAttribute('data-t'),it.getAttribute('data-n')));
    },180);};
  inp.onkeydown=e=>{if(e.key==='Enter'){const f=ac.querySelector('.acitem[data-t]');if(f)f.click();}};
  inp.onblur=()=>setTimeout(()=>{ac.innerHTML='';},200);
}

  const card=document.getElementById('src-'+id),b=card&&card.querySelector('button');

  try{
    const r=await fetch(`${API}/api/sources/${S.company}/${id}/toggle`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({connect})});
    if(!r.ok)throw new Error('toggle failed');
    const data=await r.json();

    renderCtx();
    const wrap=document.getElementById('conn-cards');if(wrap){wrap.innerHTML='';(S.sources||[]).forEach(s=>wrap.appendChild(sourceCard(s)));}
    if(connect&&(data.unlocked||[]).length)toast(`✓ Unlocked ${data.unlocked.length} ${data.unlocked.length>1?'analyses':'analysis'}: ${data.unlocked.map(u=>ANAME[u]||u).join(', ')} — see the Analyses tab`);
    else if(!connect)toast(`Disconnected ${id.toUpperCase()}`);
  }catch(e){if(b){b.disabled=false;b.textContent=connect?'Connect':'Disconnect';}toast('Could not reach the backend');}

function klabel(k){return k.replace(/_/g,' ').replace(/\bpct\b/,'%').replace(/^\w/,c=>c.toUpperCase());}
function fmtVal(k,v){
  if(v==null)return '—';
  if(typeof v==='number'){
    if(/margin|growth|_pct|retention|coverage|intensity|^top\d/.test(k))return pct(v);
    if(/income|cash|capex|fcf|flow|profit|invested|revenue|amount/.test(k))return money(v);
    return v.toLocaleString();
  }
  return esc(String(v));
}
function tbl(headers,rows){
  return `<table style="width:100%;border-collapse:collapse;margin-top:12px;font-size:13px">
    <thead><tr>${headers.map(h=>`<th style="text-align:left;padding:6px 10px;border-bottom:1px solid #e2e8f0;color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase">${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td style="padding:6px 10px;border-bottom:1px solid #f1f5f9;${i>0?'text-align:right;font-variant-numeric:tabular-nums':''}">${esc(String(c))}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
function renderAnalysis(data){
  const r=data.result||{};
  const skip=['note','source','customers','cohorts','funnel','years','top_holders','segments','by_segment','segment_gross_margin'];
  const rows=Object.entries(r).filter(([k,v])=>!skip.includes(k)&&typeof v!=='object');
  let body=rows.length?`<div class="kpis">`+rows.map(([k,v])=>`<div class="kpi"><div class="kl">${esc(klabel(k))}</div><div class="kv">${fmtVal(k,v)}</div></div>`).join('')+`</div>`:'';
  if(r.customers)body+=tbl(['Customer','Segment','Revenue','% total'],r.customers.map(c=>[c.name,c.segment||'',money(c.revenue),pct(c.pct_of_total)]));
  if(r.segments)body+=tbl(['Segment','Revenue','Gross profit','Proxy IC','ROIC'],r.segments.map(s=>[s.segment,money(s.revenue),money(s.gross_profit),money(s.proxy_invested_capital),pct(s.gp_roic_proxy)]));
  if(r.years)body+=tbl(['FY','Headcount','Rev / employee'],r.years.map(y=>[y.fiscal_year,(y.headcount||0).toLocaleString(),money(y.revenue_per_employee)]));
  if(r.top_holders)body+=tbl(['Holder','% held','Type','QoQ flow'],r.top_holders.map(h=>[h.name,pct(h.pct_held),h.is_hedge_fund?'Hedge fund':'Institution',(h.qoq_change_pct>0?'+':'')+h.qoq_change_pct+'%']));
  if(r.cohorts)body+=tbl(['Cohort','# customers','Net retention'],r.cohorts.map(c=>[c.cohort_year,c.n_customers,pct(c.net_retention)]));
  if(r.funnel)body+=tbl(['Stage','# opps','Amount'],r.funnel.map(f=>[f.stage,f.count,money(f.amount)]));
  if(r.by_segment)body+=tbl(['Segment','Revenue'],Object.entries(r.by_segment).map(([s,v])=>[s,money(v)]));
  return `<div class="panel"><div class="ph"><h3>${esc(data.name)}</h3><span class="sub">${esc(r.source||'')}</span></div>
    <div class="pb">${r.note?`<div class="callout" style="margin-bottom:12px">${esc(r.note)}</div>`:''}${body}</div></div>`;
}

function relTime(ts){if(!ts)return '';const s=Math.max(0,Date.now()/1000-ts);

function memoSections(q){
  const top5=pct(q.top5_concentration),rep=pct(q.reported_growth),und=pct(q.underlying_growth);
  const nrr=q.net_retention!=null?pct(q.net_retention):'—',cov=q.pipeline&&q.pipeline.coverage!=null?pct(q.pipeline.coverage):'—';
  const wc=q.working_capital||{};const lg=q.largest_customer?(typeof q.largest_customer==='string'?q.largest_customer:(q.largest_customer.name||'')):'';
  const out=[];
  out.push(['Thesis',`${q.issuer} (${q.ticker}) reports FY${q.fiscal_year} revenue growth of ${rep}. The headline is flattered by concentration — the top 5 customers are ${top5} of revenue and underlying growth ex-largest is ${und}. Quality-of-earnings reconciliation ${q.tied_out?'ties out to the filed XBRL within tolerance':'shows variances against the filing'}.`]);
  out.push(['Revenue quality',`Reported growth ${rep} vs underlying ${und} ex-largest customer${q.one_time_pct!=null?`; one-time items are ${pct(q.one_time_pct)} of revenue`:''}${q.recurring_growth!=null?`; recurring base grows ${pct(q.recurring_growth)}`:''}.`]);
  out.push(['Customer concentration',`Top 5 customers = ${top5} of revenue${lg?`; largest is ${lg}`:''}. This is not broken out in the 10-K — it is surfaced from the ledger.`]);
  if(wc.dso!=null)out.push(['Working capital',`DSO ${wc.dso}d${wc.dso_change!=null?` (${wc.dso_change>0?'+':''}${wc.dso_change}d YoY)`:''}${wc.dio!=null?`, DIO ${wc.dio}d`:''}${wc.dpo!=null?`, DPO ${wc.dpo}d`:''}.`]);
  out.push(['Retention & pipeline',`Net revenue retention ${nrr}; win-rate-weighted pipeline covers ${cov} of next-year growth.`]);
  if((q.insights||[]).length)out.push(['Key findings',(q.insights||[]).map(i=>`• ${i.headline}${i.evidence?` — ${i.evidence}`:''}`).join('\n')]);
  out.push(['Reconciliation & trust',`${(q.reconciliation||[]).filter(r=>r.fiscal_year===q.fiscal_year).length} public marginals checked against the private ledger — ${q.tied_out?'all tie out within tolerance.':'see variances.'} Every figure is traceable to either the 10-K (XBRL) or the calibrated ledger.`]);
  return out;
}

    mTable(['Fiscal year','Headcount','Revenue / employee'],hc.years.map(function(y){return [y.fiscal_year,(y.headcount||0).toLocaleString(),money(y.revenue_per_employee)];})),
    'Revenue per employee rising over time means the business gets more efficient as it scales.');}
  if((q.insights||[]).length)S2+=sec('Key findings','<ul>'+q.insights.map(function(i){return '<li><b>'+esc(i.headline)+'</b>'+(i.evidence?' — '+esc(i.evidence):'')+'</li>';}).join('')+'</ul>','');
  var reconN=(q.reconciliation||[]).filter(function(r){return r.fiscal_year===q.fiscal_year;}).length;
  S2+=sec('Methodology & reconciliation',
    '<p>'+reconN+' public marginals from the 10-K (XBRL) were checked against the granular ledger. '+esc(verdict)+'</p><p>Granular figures come from a <b>calibrated synthetic</b> ERP/CRM ledger fit to the company’s real reported totals by iterative proportional fitting, then validated by the same tie-out harness used to check real extraction. Every number traces to either the 10-K (XBRL) or the calibrated ledger.</p>',
    'Each detailed number was forced to add back up to the company’s real reported totals before it was allowed into this memo.');
  var css='*{box-sizing:border-box}@page{margin:15mm 14mm}'
    +'body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#15233b;font-size:10.5pt;line-height:1.5;margin:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}'
    +'.cover{border-bottom:3px solid #1f4e79;padding-bottom:14px;margin-bottom:18px}'
    +'.badge{font-size:8pt;letter-spacing:.13em;color:#1f4e79;font-weight:700}'
    +'h1{font-size:23pt;margin:6px 0 4px;font-weight:700;letter-spacing:-.4px}'
    +'h1 .tk{font-size:13pt;color:#1f4e79;font-weight:600;margin-left:7px}'
    +'.meta{color:#5a6b85;font-size:9.5pt}'
    +'.disclosure{background:#fbf6e7;border-left:3px solid #c9a227;padding:7px 11px;font-size:8.5pt;color:#6b5a1f;margin-top:12px;border-radius:0 4px 4px 0}'
    +'.kpis{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}'
    +'.kpi{flex:1 1 150px;border:1px solid #dde3ec;border-radius:7px;padding:9px 12px;background:#f8fafc}'
    +'.kpi .kl{font-size:7.5pt;text-transform:uppercase;letter-spacing:.06em;color:#6b7a93;font-weight:600}'
    +'.kpi .kv{font-size:15pt;font-weight:700;margin-top:2px}'
    +'section{margin-bottom:15px;page-break-inside:avoid}'
    +'h2{font-size:12.5pt;color:#1f4e79;border-bottom:1px solid #e4e9f1;padding-bottom:3px;margin:0 0 8px}'
    +'ul{margin:0 0 6px;padding-left:18px}li{margin:2px 0}p{margin:0 0 6px}'
    +'.plain{background:#f4f7fb;border-radius:5px;padding:6px 10px;font-size:9pt;color:#41526e}'
    +'table{width:100%;border-collapse:collapse;font-size:9pt;margin:8px 0}'
    +'th{text-align:left;background:#1f4e79;color:#fff;padding:5px 8px;font-size:8pt;text-transform:uppercase;letter-spacing:.03em}'
    +'td{padding:4px 8px;border-bottom:1px solid #eef1f6}td.num{text-align:right;font-variant-numeric:tabular-nums}'
    +'tbody tr:nth-child(even){background:#f8fafc}'
    +'.foot{margin-top:20px;border-top:1px solid #e4e9f1;padding-top:8px;font-size:8pt;color:#8a98ad}';
  return '<!doctype html><html><head><meta charset="utf-8"><title>'+esc(q.issuer)+' — Diligence memo</title><style>'+css+'</style></head><body>'
    +'<div class="cover"><div class="badge">QUALITY-OF-EARNINGS · DILIGENCE MEMO</div>'
    +'<h1>'+esc(q.issuer)+'<span class="tk">'+esc(q.ticker)+'</span></h1>'
    +'<div class="meta">Fiscal year '+q.fiscal_year+(date?' · '+date:'')+' · '+(q.tied_out?'Reconciliation tied out ✓':'Reconciliation variance')+'</div>'
    +'<div class="disclosure"><b>Calibrated demo data</b> — anchored to SEC EDGAR/XBRL filings, not real ERP/CRM data. For demonstration only; not investment advice.</div></div>'
    +'<div class="kpis">'+kpis+'</div>'+S2
    +'<div class="foot">Generated by the tie-out engine · public figures cite the 10-K (XBRL); granular figures cite the calibrated synthetic ledger.</div>'
    +'</body></html>';
}

/* ---------- Trust & validation (Evals) ---------- */
function vEvals(){
  const el=$('<div></div>');
  el.appendChild($(`<div class="phead"><h1>Trust &amp; validation</h1><p>One tie-out harness validates both real extraction <i>and</i> synthetic generation. This is whether you can believe the numbers.</p></div>`));
  el.appendChild($(`<div id="trust-live"><div class="loading"><span class="spin"></span>computing live tie-out stats…</div></div>`));
  el.appendChild($(`<div class="kpis" style="margin-top:14px">
    <div class="kc good"><div class="k">Reconciliation tolerance</div><div class="v">±1%</div><div class="d">rounding-aware interval</div></div>
    <div class="kc"><div class="k">Ground truth</div><div class="v">XBRL</div><div class="d">machine-readable filings</div></div>
    <div class="kc good"><div class="k">Generation gate</div><div class="v">ON</div><div class="d">ledger rejected unless it sums to XBRL</div></div>
  </div>`));
  el.appendChild($(`<div class="callout" style="margin-top:14px"><b>What we validate:</b> (1) <b>Generation tie-out</b> — every synthetic ledger must sum back to the reported XBRL within tolerance or it is rejected. (2) <b>Extraction tie-out</b> — every AI figure is re-checked against the filing. Same harness, two jobs.</div>`));
  el.appendChild($(`<div id="trust-grid"></div>`));
  setTimeout(loadTrust,0);
  return el;
}
async function loadTrust(){
  const live=document.getElementById('trust-live');
  let runs=[];try{runs=await(await fetch(`${API}/api/runs`)).json();}catch(e){}
  const cp=runs.reduce((a,r)=>a+(r.checks_passed||0),0),ct=runs.reduce((a,r)=>a+(r.checks_total||0),0);
  const tiedRuns=runs.filter(r=>r.tied_out===true).length,totRuns=runs.filter(r=>r.tied_out!=null).length;
  if(live)live.innerHTML=`<div class="kpis">
    <div class="kc good"><div class="k">Tie-out checks passed</div><div class="v">${ct?Math.round(cp/ct*100)+'%':'—'}</div><div class="d">${cp}/${ct} across your runs</div></div>
    <div class="kc good"><div class="k">Runs fully tied out</div><div class="v">${totRuns?tiedRuns+'/'+totRuns:'—'}</div><div class="d">this session</div></div>
    <div class="kc"><div class="k">Companies</div><div class="v">${S.companies.length}</div><div class="d">EDGAR-anchored</div></div>
  </div>`+(ct?'':'<div class="note" style="margin-top:8px">Run a QoE stream or an analysis to populate live tie-out stats.</div>');
  if(!S.evals){try{S.evals=await(await fetch(`${API}/api/eval/metrics`)).json();}catch(e){S.evals={};}}
  const m=S.evals||{},g=document.getElementById('trust-grid');
  if(g&&m.tie_out_accuracy!=null)g.innerHTML=`<div class="panel" style="margin-top:14px"><div class="ph"><h3>Verified Query Grid — extraction eval</h3><span class="sub">the other half of the trust layer</span></div><div class="pb"><div class="kpis">
    <div class="kpi"><div class="kl">Tie-out</div><div class="kv">${pct(m.tie_out_accuracy)}</div></div>
    <div class="kpi"><div class="kl">Hallucination</div><div class="kv">${pct(m.hallucination_rate)}</div></div>
    <div class="kpi"><div class="kl">Grounding</div><div class="kv">${pct(m.grounding_rate)}</div></div>
    <div class="kpi"><div class="kl">Escalations</div><div class="kv">${m.gate?m.gate.escalated:'—'}</div></div></div></div></div>`;
}

document.getElementById('scrim').onclick=closeInspect;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeInspect();});
boot();
</script>
